<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TASX Application Survey</title>
<style>
  :root{
    --accent1:#2575fc;
    --accent2:#6a11cb;
    --muted:#f3f6fb;
  }
  body{ 
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; 
    background:#f6f8fb; 
    margin:0; 
    padding:18px; 
    color:#1f2937;
  }
  header{ 
    background:linear-gradient(90deg,var(--accent1),var(--accent2)); 
    color:white; 
    padding:18px 22px; 
    border-radius:10px; 
    box-shadow:0 6px 18px rgba(36,50,90,.06); 
    margin-bottom:14px;
  }
  header h1{ margin:0; font-size:1.1rem; font-weight:600; }
  header p{ margin:6px 0 0; opacity:.95; font-size:.9rem; }

  .top-controls{
    display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap;
  }
  .top-controls .company-group{
    display:flex; align-items:center; gap:8px; flex:1; min-width:280px;
  }
  .top-controls label{ white-space:nowrap; font-weight:600; }
  .top-controls input{
    flex:1; max-width:380px; padding:8px 12px; border:1px solid #e6eef8; border-radius:8px;
  }
  .top-controls .btn-group{
    display:flex; gap:8px;
  }
  .top-controls button{
    padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-weight:600;
  }
  .top-controls .add{ background:var(--accent1); color:white; }
  .top-controls .remove{ background:#ef4444; color:white; }
  .top-controls .reset{ background:#6b7280; color:white; }

  /* === FULLY SCROLLABLE + FROZEN FIRST COLUMN === */
  .table-container {
    overflow-x: auto;
    overflow-y: visible;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(20,30,60,.04);
    background: white;
    position: relative;
  }
  .table-wrap {
    width: 100%;
    min-width: fit-content;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 900px;
    table-layout: auto;
  }

  /* === FROZEN FIRST COLUMN (Questions) === */
  th:first-child, td:first-child {
    position: sticky;
    left: 0;
    background: white;
    z-index: 11;
    min-width: 160px;
    max-width: 240px;
    white-space: nowrap;
    box-shadow: 2px 0 6px -2px rgba(0,0,0,.1);
    padding: 10px;
  }
  th:first-child { 
    background: #f3f6fb; 
    z-index: 12;
  }
  .section-title {
    background: #eef6ff !important;
    font-weight: 700 !important;
    padding: 8px;
    border-radius: 6px;
  }

  /* Project headers */
  .project-header-cell {
    width: 170px;
    min-width: 170px;
    text-align: left;
    vertical-align: top;
    padding: 10px;
    background: #fbfdff;
    border-left: 1px solid #eef6fb;
  }

  .proj-name {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    background: #fffbea;
    border: 1px solid #e6eef8;
    border-radius: 6px;
    cursor: text;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .proj-upload-wrap {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .proj-upload {
    padding: 6px 8px;
    background: #eef2ff;
    border: 1px solid #dfe7ff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .proj-filename {
    font-size: 12px;
    color: #4b5563;
  }

  /* === COMPACT TIME INPUTS (70px) === */
  .time-before-after, .time-triple {
    display: flex;
    gap: 6px;
  }
  .time-before-after input,
  .time-triple input {
    width: 70px;
    min-width: 70px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #e6eef8;
    font-size: 0.9rem;
    text-align: center;
  }

  .cell-textarea {
    width: 100%;
    padding: 8px;
    min-height: 44px;
    border-radius: 6px;
    border: 1px solid #e6eef8;
    resize: none;
  }
  .focus-cell {
    box-shadow: 0 0 0 3px rgba(37,99,235,.06) inset;
    background: #f6fbff;
    border-radius: 6px;
  }

  .submit-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .submit-btn {
    background: #10b981;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }

  .success-alert {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(.98);
    background: #10b981;
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(20,50,20,.15);
    opacity: 0;
    transition: all .35s ease;
    pointer-events: none;
    z-index: 9999;
  }
  .success-alert.show {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
    pointer-events: auto;
  }

  @media (max-width:900px){
    .top-controls{ flex-direction:column; align-items:stretch; }
    .top-controls .company-group{ flex-direction:column; align-items:flex-start; }
    .top-controls input{ max-width:none; }
    .top-controls .btn-group{ justify-content:flex-end; }
    .project-header-cell{ width:140px; min-width:140px; }
    table{ min-width:720px; }
    .time-before-after input, .time-triple input { width: 60px; min-width: 60px; }
  }
</style>
</head>
<body>

<header>
  <h1>TASX Software Feedback</h1>
  <p style="margin:6px 0 0; font-size:.88rem; opacity:.95;">Allowing us to know better about your work, and further expectations</p>
</header>

<div class="top-controls">
  <div class="company-group">
    <label for="companyName">Your Company Name:</label>
    <input type="text" id="companyName" placeholder="Enter company name…" />
  </div>
  <div class="btn-group">
    <button id="addProject" class="add">+ Add Project</button>
    <button id="removeProject" class="remove">− Remove Project</button>
    <button id="resetBtn" class="reset">Reset</button>
  </div>
</div>

<!-- FULL WIDTH, HORIZONTAL SCROLL, FROZEN FIRST COLUMN -->
<div class="table-container">
  <div class="table-wrap">
    <table id="matrixTable" role="grid" aria-label="Survey matrix">
      <thead id="matrixHead"></thead>
      <tbody id="matrixBody"></tbody>
    </table>
  </div>
</div>

<div class="submit-row">
  <button id="submitBtn" class="submit-btn">Submit</button>
</div>

<div id="success" class="success-alert">Submission done</div>

<script>
/* ---------- Configuration ---------- */
const QUESTIONS = [
  "Project Settings",
  "AI Beam Cross Section (the entire project)",
  "Smart Tables (the entire project)",
  "Wall Edit Section (the entire project)",
  "Column Edit Section (the entire project)",
  "Slab Parametric Rebar (the entire project)",
  "Efficiency"
];
const STORAGE_KEY = "survey_matrix_poc_v1_base";

/* ---------- State ---------- */
let state = { companyName: "", projects: [] };

/* ---------- Init ---------- */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      state = JSON.parse(raw);
      if(!Array.isArray(state.projects)) state.projects = [];
    }
  }catch(e){
    console.warn("load parse error", e);
    state = { companyName: "", projects: [] };
  }
  if(state.projects.length === 0){
    state.projects = [
      { name: "Project 1", screenshot: null, screenshotName: "", answers: {} },
      { name: "Project 2", screenshot: null, screenshotName: "", answers: {} },
      { name: "Project 3", screenshot: null, screenshotName: "", answers: {} }
    ];
  }
  const companyEl = document.getElementById('companyName');
  if(companyEl) companyEl.value = state.companyName || "";
}
loadState();

/* ---------- Helpers ---------- */
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function escapeHtml(s){ return String(s || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function showSuccess(){ const el = document.getElementById("success"); el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2200); }

/* ---------- Rendering ---------- */
const headEl = document.getElementById("matrixHead");
const bodyEl = document.getElementById("matrixBody");

function renderHeader(){
  headEl.innerHTML = "";
  const tr = document.createElement("tr");
  const th0 = document.createElement("th"); th0.textContent = "Questions"; tr.appendChild(th0);

  state.projects.forEach((p, idx) => {
    const th = document.createElement("th");
    th.className = "project-header-cell";
    th.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div contenteditable="true" class="proj-name" data-proj="${idx}" aria-label="Project name">${escapeHtml(p.name)}</div>
        <div class="proj-upload-wrap">
          <button class="proj-upload" data-proj="${idx}">Upload screenshot</button>
          ${p.screenshotName ? `<span class="proj-filename">${escapeHtml(p.screenshotName)}</span>` : ""}
        </div>
      </div>`;
    tr.appendChild(th);
  });
  headEl.appendChild(tr);
}

function renderBody(){
  bodyEl.innerHTML = "";
  QUESTIONS.forEach((q, qIdx) => {
    const isDual = qIdx === 0 || qIdx === 6;

    // Section title — FROZEN
    const hr = document.createElement("tr");
    const hc = document.createElement("td");
    hc.className = "section-title";
    hc.colSpan = state.projects.length + 1;
    hc.textContent = `${qIdx + 1}. ${q}`;
    hr.appendChild(hc);
    bodyEl.appendChild(hr);

    // Time Taken
    const trTime = document.createElement("tr");
    const tdLabel = document.createElement("td"); tdLabel.textContent = "Time Taken"; trTime.appendChild(tdLabel);
    state.projects.forEach((p, colIdx) => {
      const td = document.createElement("td");
      const ans = getAns(p, qIdx);
      if (isDual) {
        td.innerHTML = `
          <div class="time-before-after">
            <input type="text" class="input-before" data-q="${qIdx}" data-col="${colIdx}" placeholder="Before" value="${escapeHtml(ans.before)}">
            <input type="text" class="input-after"  data-q="${qIdx}" data-col="${colIdx}" placeholder="After"  value="${escapeHtml(ans.after)}">
          </div>`;
      } else {
        td.innerHTML = `
          <div class="time-triple">
            <input type="text" class="input-manual" data-q="${qIdx}" data-col="${colIdx}" placeholder="Manual" value="${escapeHtml(ans.manual || '')}">
            <input type="text" class="input-trb"    data-q="${qIdx}" data-col="${colIdx}" placeholder="TRB"    value="${escapeHtml(ans.trb || '')}">
            <input type="text" class="input-tasx"  data-q="${qIdx}" data-col="${colIdx}" placeholder="TASX"  value="${escapeHtml(ans.tasx || '')}">
          </div>`;
      }
      trTime.appendChild(td);
    });
    bodyEl.appendChild(trTime);

    // Feedback
    const trFb = document.createElement("tr");
    const tdFbLabel = document.createElement("td"); tdFbLabel.textContent = "Feedback"; trFb.appendChild(tdFbLabel);
    state.projects.forEach((p, colIdx) => {
      const td = document.createElement("td");
      const ans = getAns(p, qIdx);
      td.innerHTML = `<textarea class="cell-feedback" data-q="${qIdx}" data-col="${colIdx}" placeholder="Enter feedback...">${escapeHtml(ans.feedback)}</textarea>`;
      trFb.appendChild(td);
    });
    bodyEl.appendChild(trFb);
  });
}

/* ---------- Accessors ---------- */
function getAns(project, qIdx){
  const key = QUESTIONS[qIdx];
  if(!project.answers) project.answers = {};
  if(!project.answers[key]) {
    project.answers[key] = { before:"", after:"", manual:"", trb:"", tasx:"", feedback:"" };
  }
  return project.answers[key];
}

/* ---------- Wiring / Handlers ---------- */
function wireUp(){
  const companyEl = document.getElementById('companyName');
  companyEl?.addEventListener('input', e => { state.companyName = e.target.value.trim(); saveState(); });

  document.querySelectorAll('.proj-name').forEach(el=>{
    el.addEventListener('input', e=>{ const pi = +el.dataset.proj; state.projects[pi].name = el.innerText || `Project ${pi+1}`; saveState(); });
    el.addEventListener('blur', e=>{ const pi = +el.dataset.proj; state.projects[pi].name = el.innerText.trim() || `Project ${pi+1}`; el.innerText = state.projects[pi].name; saveState(); });
  });

  document.querySelectorAll('.proj-upload').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const pi = +btn.dataset.proj;
      const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'image/*';
      fi.onchange = ev=>{
        const f = ev.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = r=>{ state.projects[pi].screenshot = r.target.result; state.projects[pi].screenshotName = f.name; saveState(); rebuild(); };
        reader.readAsDataURL(f);
      };
      fi.click();
    });
  });

  document.querySelectorAll('.input-before,.input-after,.input-manual,.input-trb,.input-tasx,.cell-feedback').forEach(el=>{
    el.addEventListener('input', e=>{
      const q = +el.dataset.q, col = +el.dataset.col;
      const key = QUESTIONS[q];
      const proj = state.projects[col];
      if(!proj.answers) proj.answers = {};
      if(!proj.answers[key]) proj.answers[key] = { before:"", after:"", manual:"", trb:"", tasx:"", feedback:"" };
      const field = el.classList.contains('input-before') ? 'before' :
                    el.classList.contains('input-after') ? 'after' :
                    el.classList.contains('input-manual') ? 'manual' :
                    el.classList.contains('input-trb') ? 'trb' :
                    el.classList.contains('input-tasx') ? 'tasx' : 'feedback';
      proj.answers[key][field] = el.value;
      if(el.tagName === 'TEXTAREA') autoResize(el);
      saveState();
    });
    el.addEventListener('keydown', navHandler);
    el.addEventListener('focus', () => el.classList.add('focus-cell'));
    el.addEventListener('blur', () => el.classList.remove('focus-cell'));
    if(el.tagName === 'TEXTAREA') autoResize(el);
  });
}

/* ---------- Keyboard Navigation ---------- */
function navHandler(e){
  const el = e.target;
  const q = +el.dataset.q;
  const col = +el.dataset.col;
  const isDual = q === 0 || q === 6;
  const key = e.key;
  if(!["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Tab","Enter"].includes(key)) return;
  e.preventDefault();

  function focus(qq, cc, type){
    if(qq < 0 || qq >= QUESTIONS.length || cc < 0 || cc >= state.projects.length) return false;
    const sel = type === 'before' ? `.input-before[data-q="${qq}"][data-col="${cc}"]` :
                type === 'after'  ? `.input-after[data-q="${qq}"][data-col="${cc}"]` :
                type === 'manual' ? `.input-manual[data-q="${qq}"][data-col="${cc}"]` :
                type === 'trb'    ? `.input-trb[data-q="${qq}"][data-col="${cc}"]` :
                type === 'tasx'   ? `.input-tasx[data-q="${qq}"][data-col="${cc}"]` :
                                    `.cell-feedback[data-q="${qq}"][data-col="${cc}"]`;
    const target = document.querySelector(sel);
    if(target) { target.focus(); return true; }
    return false;
  }

  if(key === "ArrowRight" || (key === "Tab" && !e.shiftKey)){
    if(isDual){
      if(el.classList.contains('input-before') && focus(q, col, 'after')) return;
      if((el.classList.contains('input-before') || el.classList.contains('input-after')) && focus(q, col, 'feedback')) return;
    } else {
      if(el.classList.contains('input-manual') && focus(q, col, 'trb')) return;
      if(el.classList.contains('input-trb') && focus(q, col, 'tasx')) return;
      if((el.classList.contains('input-manual') || el.classList.contains('input-trb') || el.classList.contains('input-tasx')) && focus(q, col, 'feedback')) return;
    }
    focus(q, col+1, isDual ? 'before' : 'manual');
  }

  if(key === "ArrowLeft" || (key === "Tab" && e.shiftKey)){
    if(isDual){
      if(el.classList.contains('input-after') && focus(q, col, 'before')) return;
      if(el.classList.contains('cell-feedback') && focus(q, col, 'after')) return;
    } else {
      if(el.classList.contains('input-trb') && focus(q, col, 'manual')) return;
      if(el.classList.contains('input-tasx') && focus(q, col, 'trb')) return;
      if(el.classList.contains('cell-feedback') && focus(q, col, 'tasx')) return;
    }
    focus(q, col-1, 'feedback');
  }

  if(key === "ArrowDown" || key === "Enter"){
    if(el.classList.contains('cell-feedback')){
      focus(q+1, col, isDual ? 'before' : 'manual');
    } else {
      focus(q, col, 'feedback');
    }
  }

  if(key === "ArrowUp"){
    if(el.classList.contains('cell-feedback')){
      focus(q, col, isDual ? 'after' : 'tasx');
    } else {
      focus(q-1, col, 'feedback');
    }
  }
}

/* ---------- Helpers ---------- */
function autoResize(ta){
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}

/* ---------- Rebuild ---------- */
function rebuild(){ renderHeader(); renderBody(); wireUp(); }

/* ---------- Buttons ---------- */
document.getElementById('addProject').addEventListener('click', ()=>{
  const next = state.projects.length + 1;
  state.projects.push({ name:`Project ${next}`, screenshot:null, screenshotName:"", answers:{} });
  saveState(); rebuild();
  setTimeout(()=>{ document.querySelector(`.proj-name[data-proj="${state.projects.length-1}"]`)?.focus(); },60);
});

document.getElementById('removeProject').addEventListener('click', ()=>{
  if(state.projects.length<=1) return;
  state.projects.pop(); saveState(); rebuild();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm("Reset saved POC? This clears local storage and restores three sample projects.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { companyName:"", projects:[
    {name:"Project 1",screenshot:null,screenshotName:"",answers:{}},
    {name:"Project 2",screenshot:null,screenshotName:"",answers:{}},
    {name:"Project 3",screenshot:null,screenshotName:"",answers:{}}
  ]};
  saveState(); rebuild();
});

/* ---------- SUBMIT TO PANTRY ---------- */
document.getElementById('submitBtn').addEventListener('click', async ()=>{
  document.querySelectorAll('.input-before,.input-after,.input-manual,.input-trb,.input-tasx,.cell-feedback').forEach(el=>{
    const q = +el.dataset.q, col = +el.dataset.col;
    const key = QUESTIONS[q];
    const proj = state.projects[col];
    if(!proj.answers) proj.answers = {};
    if(!proj.answers[key]) proj.answers[key] = { before:"", after:"", manual:"", trb:"", tasx:"", feedback:"" };
    const field = el.classList.contains('input-before') ? 'before' :
                  el.classList.contains('input-after') ? 'after' :
                  el.classList.contains('input-manual') ? 'manual' :
                  el.classList.contains('input-trb') ? 'trb' :
                  el.classList.contains('input-tasx') ? 'tasx' : 'feedback';
    proj.answers[key][field] = el.value;
  });
  state.companyName = document.getElementById('companyName').value.trim();
  saveState();

  const submission = JSON.parse(JSON.stringify(state));
  submission.submittedAt = new Date().toISOString();

  const BASKET_ID = 'tasx-survey-2025'; // CHANGE TO YOUR BASKET
  const BASE_URL = `https://getpantry.cloud/apiv1/pantries/${BASKET_ID}`;

  try{
    let current = { submissions: [] };
    const getRes = await fetch(`https://getpantry.cloud/apiv1/pantry/2ecc5a54-3399-434b-8dec-0ac9bd307b65/basket/jsonBasket`);
    if(getRes.ok) current = await getRes.json();
    if(!Array.isArray(current.submissions)) current.submissions = [];

    current.submissions.push(submission);

    const putRes = await fetch(`https://getpantry.cloud/apiv1/pantry/2ecc5a54-3399-434b-8dec-0ac9bd307b65/basket/jsonBasket`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(current)
    });
    if(!putRes.ok) throw new Error(`PUT failed: ${putRes.status}`);

    console.log('Saved – total:', current.submissions.length);
    showSuccess();
  }catch(err){
    console.error('Pantry error:',err);
    alert('Could not save to Pantry – check console.');
  }
});

/* ---------- Start ---------- */
rebuild();
</script>
</body>
</html>
