<!DOCTYPE html>
<html lang="en" style="--accent: #5b3ef8;"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormFlow — Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   LIGHT THEME TOKENS
══════════════════════════════════════ */
:root{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --surface2:#f0f2f8;
  --surface3:#e8eaf2;
  --border:rgba(0,0,0,.09);
  --bhi:rgba(0,0,0,.18);
  --text:#1a1a2e;
  --muted:#7b7fa6;
  --accent:#5b3ef8;
  --accent2:#00b89c;
  --danger:#e03e3e;
  --glow:rgba(91,62,248,.15);
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;--rsm:8px;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1)
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.hidden{display:none!important}

/* ── BUTTONS ── */
.btn{font-family:var(--fb);font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--rsm);border:none;cursor:pointer;transition:.18s var(--ease);outline:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--bhi);background:var(--surface2)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c5cfc);color:#fff;box-shadow:0 2px 12px var(--glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--glow)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-danger{background:rgba(224,62,62,.07);color:var(--danger);border:1px solid rgba(224,62,62,.2)}
.btn-danger:hover{background:rgba(224,62,62,.14)}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:12px}
.btn-icon:hover{color:var(--text);border-color:var(--bhi);background:var(--surface3)}
.btn-teal{background:linear-gradient(135deg,var(--accent2),#00d4b4);color:#fff;box-shadow:0 2px 10px rgba(0,184,156,.2)}
.btn-teal:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,184,156,.3)}

/* ── FORM CONTROLS ── */
.fi{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rsm);padding:9px 13px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:.18s var(--ease)}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.fi::placeholder{color:var(--muted)}
textarea.fi{resize:vertical;min-height:60px;line-height:1.5}
.lbl{display:block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:11px}
select.fi{appearance:none;padding-right:28px;cursor:pointer;background:var(--surface)}
.toggle{width:36px;height:20px;border-radius:100px;background:var(--surface3);border:1.5px solid var(--border);cursor:pointer;position:relative;transition:.18s;flex-shrink:0}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle-t{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on .toggle-t{transform:translateX(16px)}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
#builder{display:flex;flex-direction:column;height:100vh}
.b-nav{
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;padding:0 16px;height:54px;flex-shrink:0;gap:10px;
  z-index:200;position:relative;
  box-shadow:0 1px 6px rgba(0,0,0,.06)
}
.b-nav-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.b-nav-c{display:flex;align-items:center;gap:2px;flex-shrink:0}
.b-nav-r{display:flex;align-items:center;gap:7px;flex:1;justify-content:flex-end}
.logo{font-family:var(--fd);font-size:19px;font-weight:600;letter-spacing:-.5px;display:flex;align-items:center;gap:7px;flex-shrink:0;color:var(--text)}
.logo-i{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#00b89c);display:flex;align-items:center;justify-content:center;font-size:13px}
.logo span{color:var(--accent)}
.form-title-inp{background:transparent;border:none;outline:none;font-family:var(--fd);font-size:14px;font-weight:600;color:var(--text);min-width:80px;max-width:200px;padding:3px 8px;border-radius:6px;transition:.18s}
.form-title-inp:hover,.form-title-inp:focus{background:var(--surface2)}
.tab-btn{font-family:var(--fb);font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;border:none;cursor:pointer;transition:.18s;background:transparent;color:var(--muted)}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow)}
.tab-btn:hover:not(.active){color:var(--text);background:var(--surface2)}
.save-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap}
.b-body{flex:1;display:flex;overflow:hidden}

/* ══════════════════════════════════════
   LEFT PANEL
══════════════════════════════════════ */
.p-left{width:252px;flex-shrink:0;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.p-sec-hd{padding:10px 13px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.q-list{flex:1;overflow-y:auto;padding:6px}

.q-item{padding:8px 10px;border-radius:var(--rsm);cursor:pointer;transition:.15s;border:1.5px solid transparent;margin-bottom:3px;display:flex;align-items:flex-start;gap:8px}
.q-item:hover{background:var(--surface2)}
.q-item.active{background:rgba(91,62,248,.07);border-color:rgba(91,62,248,.25)}
.q-num{width:20px;height:20px;border-radius:5px;background:var(--surface3);border:1px solid var(--border);font-size:9px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.q-item.active .q-num{background:var(--accent);border-color:var(--accent);color:#fff}
.q-info{flex:1;min-width:0}
.q-type-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.q-lbl{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.q-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:2px 4px;border-radius:3px;transition:.15s;flex-shrink:0;line-height:1}
.q-item:hover .q-del{opacity:1}
.q-del:hover{color:var(--danger);background:rgba(224,62,62,.08)}

.sec-item{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;transition:.15s;border:1.5px solid rgba(0,184,156,.15);margin-bottom:3px;display:flex;align-items:center;gap:8px;background:rgba(0,184,156,.04)}
.sec-item:hover{background:rgba(0,184,156,.09)}
.sec-item.active{background:rgba(0,184,156,.12);border-color:rgba(0,184,156,.35)}
.sec-icon{width:20px;height:20px;border-radius:5px;background:rgba(0,184,156,.12);border:1px solid rgba(0,184,156,.3);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent2)}
.sec-item.active .sec-icon{background:var(--accent2);color:#fff}
.sec-children{margin-left:14px;border-left:2px solid rgba(0,184,156,.18);padding-left:8px}
.sec-q-item{padding:7px 9px;border-radius:var(--rsm);cursor:pointer;transition:.15s;border:1.5px solid transparent;margin-bottom:2px;display:flex;align-items:flex-start;gap:7px}
.sec-q-item:hover{background:var(--surface2)}
.sec-q-item.active{background:rgba(91,62,248,.07);border-color:rgba(91,62,248,.25)}

/* Matrix in list */
.mat-item{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;transition:.15s;border:1.5px solid rgba(255,150,0,.15);margin-bottom:3px;display:flex;align-items:center;gap:8px;background:rgba(255,150,0,.04)}
.mat-item:hover{background:rgba(255,150,0,.09)}
.mat-item.active{background:rgba(255,150,0,.12);border-color:rgba(255,150,0,.4)}
.mat-icon{width:20px;height:20px;border-radius:5px;background:rgba(255,150,0,.12);border:1px solid rgba(255,150,0,.3);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#f07000}
.mat-item.active .mat-icon{background:#f07000;color:#fff}

.screen-list-item{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;transition:.15s;border:1.5px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:600}
.screen-list-item:hover{background:var(--surface2);color:var(--text)}
.screen-list-item.active{background:rgba(91,62,248,.07);border-color:rgba(91,62,248,.25);color:var(--text)}
.screen-list-icon{font-size:14px;flex-shrink:0}

.add-q-panel{padding:8px 6px;border-top:1.5px solid var(--border);background:var(--surface2)}
.add-q-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 3px 6px}
.q-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.q-type-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rsm);padding:2px 1px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:var(--fb);color:var(--muted);font-size:6px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.q-type-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,62,248,.05)}
.q-type-btn .ico{font-size:14px}
.q-type-btn.section-btn{background:rgba(0,184,156,.04);border-color:rgba(0,184,156,.2);color:var(--accent2)}
.q-type-btn.section-btn:hover{border-color:var(--accent2);background:rgba(0,184,156,.09)}
.q-type-btn.matrix-btn{background:rgba(255,150,0,.04);border-color:rgba(255,150,0,.2);color:#f07000}
.q-type-btn.matrix-btn:hover{border-color:#f07000;background:rgba(255,150,0,.09)}

/* ══════════════════════════════════════
   CANVAS
══════════════════════════════════════ */
.canvas-area{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(rgba(0,0,0,.04) 1px,transparent 1px);background-size:22px 22px}
.canvas-inner{flex:1;overflow-y:auto;padding:28px 32px;display:flex;align-items:flex-start;justify-content:center}
.editor-stack{width:100%;max-width:700px;display:flex;flex-direction:column;gap:14px}

.q-editor,.screen-editor,.sec-editor,.mat-editor{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);animation:slideIn .22s var(--ease) both}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ed-head{padding:13px 22px;background:var(--surface2);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.type-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:rgba(91,62,248,.09);padding:4px 10px;border-radius:100px;border:1.5px solid rgba(91,62,248,.2)}
.sec-badge{color:var(--accent2);background:rgba(0,184,156,.09);border-color:rgba(0,184,156,.25)}
.mat-badge{color:#f07000;background:rgba(255,150,0,.09);border-color:rgba(255,150,0,.25)}
.welcome-badge{color:var(--accent2);background:rgba(0,184,156,.08);border-color:rgba(0,184,156,.22)}
.end-badge{color:#d4890a;background:rgba(255,189,46,.08);border-color:rgba(255,189,46,.22)}
.ed-body{padding:22px;display:flex;flex-direction:column;gap:14px}
.field-row{display:flex;flex-direction:column;gap:6px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.opt-list{display:flex;flex-direction:column;gap:6px}
.opt-item{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:7px 12px;transition:.15s}
.opt-item:hover{border-color:var(--bhi)}
.drag-h{color:var(--muted);font-size:11px;cursor:grab;flex-shrink:0}
.opt-inp{flex:1;background:transparent;border:none;outline:none;font-family:var(--fb);font-size:13px;color:var(--text)}
.opt-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:2px 4px;border-radius:3px;opacity:0;transition:.15s}
.opt-item:hover .opt-del{opacity:1}
.opt-del:hover{color:var(--danger)}
.add-opt-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed var(--border);border-radius:var(--rsm);padding:7px 12px;width:100%;cursor:pointer;transition:.15s;font-family:var(--fb);font-size:12px;color:var(--muted)}
.add-opt-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,62,248,.04)}

/* Picture editor */
.pic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.pic-slot{background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;overflow:hidden;aspect-ratio:1;position:relative;cursor:pointer;transition:.15s}
.pic-slot:hover{border-color:var(--accent);background:rgba(91,62,248,.04)}
.pic-slot img{width:100%;height:100%;object-fit:cover;display:block}
.pic-slot-lbl{position:absolute;bottom:0;left:0;right:0;padding:5px 8px;background:rgba(255,255,255,.9);font-size:10px;font-weight:600;color:var(--text)}
.pic-slot-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px}
.pic-slot-actions{position:absolute;top:4px;right:4px;display:flex;gap:3px;opacity:0;transition:.15s}
.pic-slot:hover .pic-slot-actions{opacity:1}
.add-pic-slot{background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:.15s;color:var(--muted);font-size:10px}
.add-pic-slot:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(0,184,156,.05)}

/* Matrix editor */
.mat-editor .ed-body{gap:0;padding:0}
.mat-section{padding:20px 22px;border-bottom:1px solid var(--border)}
.mat-section:last-child{border-bottom:none}
.mat-cols-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.mat-col-chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:4px 9px;font-size:12px}
.mat-col-inp{border:none;background:transparent;outline:none;font-family:var(--fb);font-size:12px;color:var(--text);min-width:60px;max-width:110px}
.mat-row-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.mat-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px}
.mat-row-q{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.mat-row-type-badge{font-size:9px;font-weight:600;color:#f07000;background:rgba(255,150,0,.1);border:1px solid rgba(255,150,0,.2);border-radius:100px;padding:2px 8px;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.mat-preview{display:grid;gap:2px;font-size:10px;overflow-x:auto}
.mat-preview-hd{display:contents}
.mat-preview-cell{background:var(--surface3);border-radius:4px;padding:3px 6px;text-align:center;color:var(--muted);font-weight:600}
.mat-preview-row-lbl{background:var(--surface3);border-radius:4px;padding:3px 8px;color:var(--text);font-weight:600;white-space:nowrap}
.mat-preview-input{background:rgba(91,62,248,.07);border-radius:4px;padding:3px 6px;text-align:center;color:var(--accent);font-weight:600}

/* Logic */
.logic-wrap{border-top:1.5px solid var(--border);padding:14px 22px;background:var(--surface2)}
.logic-title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.logic-rule{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rsm);padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;box-shadow:var(--shadow)}
.logic-rule select{background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;font-family:var(--fb);font-size:11px;color:var(--text);outline:none}
.logic-rule select:focus{border-color:var(--accent)}
.logic-arrow{font-size:11px;color:var(--muted);flex-shrink:0}

/* Drawing */
.drawing-area{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);position:relative}
.draw-canvas{display:block;touch-action:none;cursor:crosshair}
.draw-tools{display:flex;align-items:center;gap:5px;padding:7px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--surface2)}
.draw-tool-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s;color:var(--muted)}
.draw-tool-btn:hover,.draw-tool-btn.active{border-color:var(--accent);background:rgba(91,62,248,.08);color:var(--accent)}
.draw-color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:.15s;flex-shrink:0}
.draw-color-swatch:hover{transform:scale(1.15)}
.draw-color-swatch.active{border-color:var(--accent);box-shadow:0 0 0 1.5px white}
.draw-size-inp{width:48px;background:var(--surface);border:1.5px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--text);font-family:var(--fb);outline:none}
.draw-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.sec-q-list{display:flex;flex-direction:column;gap:6px;padding:10px 0}
.sec-q-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:9px 12px;display:flex;align-items:center;gap:8px;transition:.15s}
.sec-q-card:hover{border-color:var(--bhi)}

/* ══════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════ */
.p-right{width:258px;flex-shrink:0;background:var(--surface);border-left:1.5px solid var(--border);overflow-y:auto;padding:14px;box-shadow:-2px 0 8px rgba(0,0,0,.04)}
.s-title{font-family:var(--fd);font-size:12px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid var(--border);letter-spacing:.02em;color:var(--text)}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px}
.cs{width:28px;height:28px;border-radius:6px;cursor:pointer;transition:.15s;border:2.5px solid transparent}
.cs:hover{transform:scale(1.1)}
.cs.sel{border-color:var(--text);box-shadow:0 0 0 1.5px var(--accent)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface2);border-radius:var(--rsm);margin-bottom:6px;border:1px solid var(--border)}
.sr-label{font-size:12px;font-weight:600;color:var(--text)}
.sr-desc{font-size:10px;color:var(--muted);margin-top:1px}

/* CSV toolbar */
.csv-toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 4px}
.csv-toolbar .btn{font-size:11px;padding:5px 11px}

/* ══════════════════════════════════════
   RESULTS
══════════════════════════════════════ */
.results-body{flex:1;overflow-y:auto;padding:32px}
.results-hd{max-width:880px;margin:0 auto 22px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px}
.results-title{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--text)}
.stat-grid{max-width:880px;margin:0 auto 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.stat-val{font-family:var(--fd);font-size:30px;font-weight:600;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--muted)}
.resp-table{max-width:880px;margin:0 auto}
.resp-entry{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.resp-meta{font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:500}
.resp-row{font-size:12px;display:grid;grid-template-columns:180px 1fr;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.resp-row:last-child{border-bottom:none}
.resp-q{color:var(--muted);font-weight:500}
.resp-a{color:var(--text);font-weight:600}
.gcp-banner{background:rgba(0,184,156,.05);border:1.5px solid rgba(0,184,156,.2);border-radius:var(--r);padding:14px;margin-bottom:16px;font-size:12px;line-height:1.6;color:var(--muted)}
.gcp-banner h4{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:5px}

/* ══════════════════════════════════════
   PREVIEW
══════════════════════════════════════ */
#preview{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
.prev-nav{background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.prog-bar{height:3px;background:var(--surface3);flex-shrink:0;position:relative;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s var(--ease);position:absolute;left:0;top:0}
.form-view{flex:1;overflow:hidden;position:relative}

/* Slides */
.form-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;opacity:0;pointer-events:none;transition:opacity .35s var(--ease),transform .35s var(--ease)}
.form-slide.active{opacity:1;transform:none;pointer-events:all}
.form-slide.slide-up{transform:translateY(28px)}
.form-slide.slide-down{transform:translateY(-28px)}

.section-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:0;opacity:0;pointer-events:none;transition:opacity .35s var(--ease),transform .35s var(--ease)}
.section-slide.active{opacity:1;transform:none;pointer-events:all}
.section-slide.slide-up{transform:translateY(28px)}
.section-slide.slide-down{transform:translateY(-28px)}
.section-slide-inner{width:100%;max-width:700px;margin:0 auto;padding:32px 24px;overflow-y:auto;height:100%;display:flex;flex-direction:column}
.section-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1.5px solid var(--border)}
.section-qs{display:flex;flex-direction:column;gap:32px;flex:1}

.welcome-canvas-display{width:100%;max-width:620px;margin:0 auto 24px;border-radius:14px;overflow:hidden;display:block;box-shadow:var(--shadow)}

.slide-inner{width:100%;max-width:640px}
.slide-num{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.slide-num::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.slide-q{font-family:var(--fd);font-size:clamp(21px,3.2vw,34px);font-weight:600;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px;color:var(--text)}
.slide-desc{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.6}

.welcome-title{font-family:var(--fd);font-size:clamp(26px,4.5vw,50px);font-weight:600;letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px;text-align:center;word-break:break-word;color:var(--text)}
.welcome-sub{font-size:16px;color:var(--muted);line-height:1.7;text-align:center;max-width:500px;margin:0 auto 32px}

/* Input styles */
.s-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border);padding:9px 2px;font-family:var(--fb);font-size:16px;color:var(--text);outline:none;transition:.18s}
.s-input:focus{border-bottom-color:var(--accent)}
.s-input::placeholder{color:rgba(0,0,0,.22)}
textarea.s-input{min-height:72px;resize:none;padding:9px 2px}

/* Choice */
.s-opts{display:flex;flex-direction:column;gap:8px}
.s-opt{display:flex;align-items:center;gap:12px;background:var(--surface);border:2px solid var(--border);border-radius:11px;padding:12px 16px;cursor:pointer;transition:all .15s;font-size:14px;user-select:none;color:var(--text);box-shadow:var(--shadow)}
.s-opt:hover{border-color:var(--accent);background:rgba(91,62,248,.03);transform:translateX(3px)}
.s-opt.selected{border-color:var(--accent);background:rgba(91,62,248,.06)}
.opt-key{width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;font-family:var(--fd);color:var(--muted);transition:.15s}
.s-opt.selected .opt-key{background:var(--accent);border-color:var(--accent);color:#fff}

/* Multi-buttons */
.mb-grid{display:flex;flex-wrap:wrap;gap:8px}
.mb-btn{padding:9px 18px;border-radius:100px;background:var(--surface);border:2px solid var(--border);cursor:pointer;font-family:var(--fb);font-size:13px;font-weight:600;color:var(--text);transition:all .15s;user-select:none;box-shadow:var(--shadow)}
.mb-btn:hover{border-color:var(--accent);background:rgba(91,62,248,.04);transform:scale(1.03)}
.mb-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 12px var(--glow)}
.mb-btn.selected::before{content:'✓ ';font-size:10px}
@keyframes mbPop{0%{transform:scale(.9)}60%{transform:scale(1.06)}100%{}}
.mb-btn.pop{animation:mbPop .18s var(--ease)}

/* Three options */
.three-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.three-btn{padding:18px 10px;border-radius:13px;background:var(--surface);border:2px solid var(--border);cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--text);text-align:center;transition:all .18s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow)}
.three-btn .t-ico{font-size:26px;line-height:1}
.three-btn:hover{border-color:var(--accent);background:rgba(91,62,248,.04);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.three-btn.selected{border-color:var(--accent);background:rgba(91,62,248,.08);box-shadow:0 0 0 3px rgba(91,62,248,.15)}
@keyframes threeSelect{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{}}
.three-btn.pop{animation:threeSelect .2s var(--ease)}

/* Pic buttons */
.pic-btns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.pic-btn-card{border-radius:13px;overflow:hidden;background:var(--surface);border:2px solid var(--border);cursor:pointer;transition:all .18s;user-select:none;box-shadow:var(--shadow)}
.pic-btn-card img{width:100%;height:100px;object-fit:cover;display:block;transition:transform .25s}
.pic-btn-card:hover img{transform:scale(1.04)}
.pic-btn-card:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.pic-btn-card.selected{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(0,184,156,.2)}
.pic-btn-wrap{position:relative}
.pic-check{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:var(--accent2);display:none;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(0,184,156,.3)}
.pic-btn-card.selected .pic-check{display:flex}
.pic-btn-lbl{padding:8px 10px;font-size:12px;font-weight:600;text-align:center;background:var(--surface2);border-top:1px solid var(--border);color:var(--text)}
.pic-btn-card.selected .pic-btn-lbl{color:var(--accent2)}

/* Dropdown */
.custom-drop-wrap{position:relative}
.custom-drop-trigger{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:11px;padding:12px 16px;font-family:var(--fb);font-size:14px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.18s;user-select:none;box-shadow:var(--shadow)}
.custom-drop-trigger.has-val{color:var(--text)}
.custom-drop-trigger:hover{border-color:var(--bhi)}
.custom-drop-trigger.open{border-color:var(--accent);border-bottom-left-radius:0;border-bottom-right-radius:0}
.drop-arrow{font-size:11px;color:var(--muted);transition:transform .2s}
.custom-drop-trigger.open .drop-arrow{transform:rotate(180deg)}
.custom-drop-menu{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:2px solid var(--accent);border-top:none;border-bottom-left-radius:11px;border-bottom-right-radius:11px;max-height:0;overflow:hidden;transition:max-height .28s var(--ease);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.custom-drop-menu.open{max-height:240px;overflow-y:auto}
.drop-opt{padding:11px 16px;font-size:13px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;color:var(--text)}
.drop-opt:last-child{border-bottom:none}
.drop-opt:hover{background:rgba(91,62,248,.06);color:var(--accent)}
.drop-opt.sel{background:rgba(0,184,156,.07);color:var(--accent2);font-weight:600}
.drop-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);opacity:0;flex-shrink:0}
.drop-opt.sel .drop-dot{opacity:1}

/* Rating */
.s-rating{display:flex;gap:7px;flex-wrap:wrap}
.rate-btn{width:44px;height:44px;border-radius:10px;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer;transition:all .13s;color:var(--muted);box-shadow:var(--shadow)}
.rate-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.07)}
.rate-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 12px var(--glow)}

/* Scale */
.scale-val-display{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--accent);margin-bottom:12px}
.custom-range{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:5px;outline:none;cursor:pointer;background:linear-gradient(90deg,var(--accent) calc(var(--pct,50%)*1%),var(--surface3) calc(var(--pct,50%)*1%))}
.custom-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px var(--glow),0 1px 4px rgba(0,0,0,.15);border:2.5px solid #fff;transition:transform .12s}
.custom-range::-webkit-slider-thumb:hover{transform:scale(1.2)}
.scale-labels{display:flex;justify-content:space-between;margin-top:8px}
.scale-lbl{font-size:11px;color:var(--muted);font-weight:600}

/* Date */
.date-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.date-part-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.date-sel{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-family:var(--fd);font-size:15px;color:var(--text);outline:none;cursor:pointer;transition:.15s;appearance:none;text-align:center;font-weight:600;box-shadow:var(--shadow)}
.date-sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.date-display{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--accent);margin-top:10px;min-height:24px}

/* Matrix preview in form */
.matrix-table-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid var(--border);box-shadow:var(--shadow)}
.matrix-table{width:100%;border-collapse:collapse;background:var(--surface)}
.matrix-table th{background:var(--surface2);padding:10px 14px;text-align:center;font-size:12px;font-weight:600;color:var(--text);border-bottom:2px solid var(--border);border-right:1px solid var(--border);white-space:nowrap}
.matrix-table th:first-child{text-align:left;min-width:140px;border-right:2px solid var(--border)}
.matrix-table td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;font-size:13px}
.matrix-table td:first-child{text-align:left;font-weight:600;color:var(--text);background:var(--surface2);border-right:2px solid var(--border);font-size:12px}
.matrix-table tr:last-child td{border-bottom:none}
.matrix-table tr:hover td{background:rgba(91,62,248,.03)}
.matrix-table tr:hover td:first-child{background:var(--surface3)}
/* matrix input cells */
.mat-cell-short{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--fb);font-size:12px;outline:none;transition:.15s;background:var(--surface);color:var(--text)}
.mat-cell-short:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.mat-cell-num{width:70px;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--fd);font-size:13px;font-weight:600;outline:none;transition:.15s;background:var(--surface);color:var(--text);text-align:center}
.mat-cell-num:focus{border-color:var(--accent)}
.mat-cell-chk{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.mat-cell-radio{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.mat-star-row{display:flex;gap:3px;justify-content:center}
.mat-star{font-size:16px;cursor:pointer;color:var(--surface3);transition:.12s;line-height:1}
.mat-star.lit{color:#f5a623}
.mat-star:hover,.mat-star:hover~.mat-star{color:var(--surface3)}
.mat-stars:hover .mat-star{color:#f5a623}
.mat-stars .mat-star:hover~.mat-star{color:var(--surface3)}
.mat-cell-range{width:100%;max-width:100px;accent-color:var(--accent)}

/* Req badge */
.req-badge{display:inline-flex;align-items:center;background:rgba(224,62,62,.07);border:1px solid rgba(224,62,62,.2);color:var(--danger);border-radius:100px;padding:2px 7px;font-size:9px;font-weight:600;margin-left:7px;vertical-align:middle}

/* Nav buttons */
.btn-next{background:linear-gradient(135deg,var(--accent),#7c5cfc);border:none;border-radius:11px;padding:12px 24px;font-family:var(--fb);font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:.18s;box-shadow:0 3px 14px var(--glow);display:flex;align-items:center;gap:7px}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 22px var(--glow)}
.btn-submit{background:linear-gradient(135deg,var(--accent2),#00d4b4);box-shadow:0 3px 14px rgba(0,184,156,.3)}
.btn-submit:hover{box-shadow:0 6px 22px rgba(0,184,156,.4)}
.btn-back{background:var(--surface);border:2px solid var(--border);border-radius:11px;padding:10px 16px;font-family:var(--fb);font-size:14px;color:var(--muted);cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.btn-back:hover{background:var(--surface2);color:var(--text)}
.btn-skip{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;transition:.15s;font-weight:600}
.btn-skip:hover{color:var(--text)}
.s-nav{display:flex;align-items:center;gap:10px;margin-top:24px;flex-wrap:wrap}
.kbd-hint{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin-top:8px;font-weight:500}
kbd{background:var(--surface2);border:1.5px solid var(--border);border-radius:4px;padding:1px 5px;font-size:9px;font-family:var(--fd);color:var(--text)}

/* Thank you */
.ty-icon{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),#00d4b4);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 0 40px rgba(0,184,156,.22);animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.ty-title{font-family:var(--fd);font-size:clamp(24px,4vw,38px);font-weight:600;letter-spacing:-1px;margin-bottom:8px;animation:fadeUp .4s .1s ease both;word-break:break-word;text-align:center;color:var(--text)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Save progress banner */
.resume-banner{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;max-width:500px;margin:0 auto 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow)}
.rb-title{font-weight:600;color:var(--text);margin-bottom:2px;font-size:13px}
.rb-meta{color:var(--muted);font-size:12px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--surface);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 6px 28px rgba(0,0,0,.18);opacity:0;transition:all .25s var(--ease);z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake .3s}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center}
.modal-ov.show{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:30px;max-width:480px;width:92%;animation:fadeUp .28s ease both;box-shadow:var(--shadow-lg)}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:600;margin-bottom:5px;letter-spacing:-.5px;color:var(--text)}
.share-row{display:flex;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rsm);overflow:hidden;margin:12px 0}
.share-row input{flex:1;background:transparent;border:none;outline:none;padding:10px 13px;font-family:var(--fb);font-size:12px;color:var(--text)}
.share-row button{background:var(--accent);border:none;padding:10px 14px;color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--fb);transition:.15s;flex-shrink:0}
.share-row button:hover{background:#7c5cfc}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid transparent}
.pill-green{background:rgba(0,184,156,.09);color:var(--accent2);border-color:rgba(0,184,156,.2)}
.pill-purple{background:rgba(91,62,248,.09);color:var(--accent);border-color:rgba(91,62,248,.2)}
.pill-orange{background:rgba(255,150,0,.1);color:#f07000;border-color:rgba(255,150,0,.25)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;min-height:200px}
.empty-ico{font-size:36px;margin-bottom:12px;opacity:.35}
.empty-ttl{font-family:var(--fd);font-size:16px;font-weight:600;margin-bottom:5px;color:var(--text)}
.empty-sub{font-size:12px}

/* CSV import panel */
.import-drop-zone{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:.18s;background:var(--surface2)}
.import-drop-zone:hover,.import-drop-zone.drag-over{border-color:var(--accent);background:rgba(91,62,248,.04)}
.import-drop-zone .idz-ico{font-size:30px;margin-bottom:8px}
.import-drop-zone .idz-txt{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.import-drop-zone .idz-sub{font-size:11px;color:var(--muted)}
.import-preview{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;max-height:240px;overflow-y:auto}
.import-preview table{width:100%;border-collapse:collapse;font-size:11px}
.import-preview th{background:var(--surface3);padding:5px 8px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)}
.import-preview td{padding:4px 8px;border-bottom:1px solid var(--border);color:var(--muted)}
.import-preview tr:last-child td{border-bottom:none}

@media(max-width:760px){
  .p-left,.p-right{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .three-grid{grid-template-columns:1fr}
  .date-grid{grid-template-columns:1fr 1fr 1fr}
}
.drop-target {
  border-top: 2px solid var(--accent) !important;
  background: rgba(91,62,248,.05) !important;
}
</style>

<body>

     BUILDER

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
const S = {
  items: [],
  activeId: null,
  editingScreen: null,
  settings: {
    title: 'Untitled Form',
    accent: '#5b3ef8',
    font: 'Syne',
    welcome: { title: 'Welcome! 👋', subtitle: 'This form will only take a few minutes.', buttonText: "Let's go →", drawing: null },
    end: { title: 'All done! 🎉', subtitle: 'Thank you so much for your responses.', drawing: null },
  },
  responses: [],
  views: 0,
  currentSlide: 0,
  answers: {},
  submitted: false,
};

const TYPES = {
  short:{label:'Short Text',icon:'✏️'},
  long:{label:'Long Text',icon:'📝'},
  choice:{label:'Choice',icon:'☑️'},
  multibutton:{label:'Multi-Buttons',icon:'🔘'},
  three:{label:'3 Options',icon:'⚡'},
  picturebutton:{label:'Pic Buttons',icon:'🖼️'},
  dropdown:{label:'Dropdown',icon:'▾'},
  rating:{label:'Rating',icon:'⭐'},
  scale:{label:'Scale',icon:'↔️'},
  yesno:{label:'Yes / No',icon:'🔀'},
  email:{label:'Email',icon:'📧'},
  number:{label:'Number',icon:'🔢'},
  date:{label:'Date',icon:'📅'},
};

// Matrix row types
const MAT_ROW_TYPES = ['short','number','checkbox','radio','rating','scale'];

const uid = () => Math.random().toString(36).slice(2,9);
const esc = s => s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
window.onload = () => {
  try {
    const d = JSON.parse(localStorage.getItem('ff_builder_draft')||'null');
    if (d?.items && d?.settings) {
      S.items = d.items; Object.assign(S.settings, d.settings);
      document.getElementById('formTitle').value = S.settings.title;
      applyStyleSettings();
      S.activeId = S.items[0]?.id || null;
    }
  } catch(e){}
  if (!S.items.length) addDefaultContent();
  renderAll();
};

function addDefaultContent() {
  S.items.push({ id:uid(), kind:'question', type:'short', question:"What's your name?", description:"We'd love to know who we're talking to.", required:true });
  S.items.push({ id:uid(), kind:'question', type:'choice', question:'How did you hear about us?', description:'', options:['Social media','Friend','Search engine','Other'], multiple:false, other:false });
  const sid = uid();
  S.items.push({ id:sid, kind:'section', title:'Your Experience', description:'Tell us how it went', logic:[] });
  S.items.push({ id:uid(), kind:'question', sectionId:sid, type:'rating', question:'How would you rate your overall experience?', description:'10 = amazing!', ratingMax:10 });
  S.items.push({ id:uid(), kind:'question', sectionId:sid, type:'long', question:'Any additional comments?', description:'We read every response.' });
  const matId = uid();
  S.items.push({ id:matId, kind:'matrix',
    title:'Product Feedback Matrix',
    description:'Rate each product across the dimensions below',
    columns:['Quality','Value','Design'],
    rows:[
      {id:uid(), label:'Product A', type:'rating'},
      {id:uid(), label:'Product B', type:'rating'},
      {id:uid(), label:'Product C', type:'radio'},
    ]
  });
  S.activeId = S.items[0].id;
}

/* ════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════ */
function switchTab(t) {
  ['build','preview','results'].forEach(tab => document.getElementById(`tab-${tab}`)?.classList.toggle('active', tab===t));
  document.getElementById('area-build').classList.toggle('hidden', t!=='build');
  document.getElementById('area-results').classList.toggle('hidden', t!=='results');
  const prev = document.getElementById('preview');
  const bld = document.getElementById('builder');
  if (t==='preview') { bld.style.display='none'; prev.style.display='flex'; prev.classList.remove('hidden'); launchPreview(); }
  else { prev.style.display='none'; prev.classList.add('hidden'); bld.style.display='flex'; }
  if (t==='results') renderResults();
}

function backToBuilder() {
  document.getElementById('preview').style.display='none';
  document.getElementById('preview').classList.add('hidden');
  document.getElementById('builder').style.display='flex';
  ['build','preview','results'].forEach(t => document.getElementById(`tab-${t}`)?.classList.remove('active'));
  document.getElementById('tab-build').classList.add('active');
  document.getElementById('area-build').classList.remove('hidden');
  document.getElementById('area-results').classList.add('hidden');
}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function renderAll() { renderQList(); renderEditor(); }

function renderQList() {
  const el = document.getElementById('qList');
  let html = '';
  html += `<div class="screen-list-item ${S.editingScreen==='welcome'?'active':''}" onclick="editScreen('welcome')"><span class="screen-list-icon">🏠</span><span>Welcome Screen</span></div>`;
  const rendered = new Set();
  let qNum = 0;

  // Helper to attach drag events to list items
  const dragEvents = (id) => `draggable="true" ondragstart="dragStart(event, '${id}')" ondragend="dragEnd(event)" ondragover="dragOver(event)" ondrop="dropItemOn(event, '${id}')"`;

  S.items.forEach(item => {
    if (rendered.has(item.id)) return;
    if (item.kind==='section') {
      rendered.add(item.id);
      const children = S.items.filter(q=>q.kind==='question'&&q.sectionId===item.id);
      html += `<div class="sec-item ${S.activeId===item.id&&!S.editingScreen?'active':''}" onclick="setActive('${item.id}')" ${dragEvents(item.id)}>
        <div class="sec-icon">§</div>
        <div class="q-info"><div class="q-type-lbl">Section</div><div class="q-lbl">${esc(item.title||'Untitled Section')}</div></div>
        <button class="q-del" onclick="event.stopPropagation();delItem('${item.id}')">✕</button>
      </div><div class="sec-children">`;
      children.forEach(cq => { rendered.add(cq.id); qNum++;
        html += `<div class="sec-q-item ${S.activeId===cq.id&&!S.editingScreen?'active':''}" onclick="setActive('${cq.id}')" ${dragEvents(cq.id)}>
          <div class="q-num" style="font-size:9px">${qNum}</div>
          <div class="q-info"><div class="q-type-lbl">${TYPES[cq.type]?.icon} ${TYPES[cq.type]?.label||cq.type}</div><div class="q-lbl">${esc(cq.question||'Untitled')}</div></div>
          <button class="q-del" onclick="event.stopPropagation();delItem('${cq.id}')">✕</button>
        </div>`;
      });
      html += `</div>`;
    } else if (item.kind==='matrix') {
      rendered.add(item.id);
      html += `<div class="mat-item ${S.activeId===item.id&&!S.editingScreen?'active':''}" onclick="setActive('${item.id}')" ${dragEvents(item.id)}>
        <div class="mat-icon">⊞</div>
        <div class="q-info"><div class="q-type-lbl">Matrix · ${(item.rows||[]).length} rows</div><div class="q-lbl">${esc(item.title||'Untitled Matrix')}</div></div>
        <button class="q-del" onclick="event.stopPropagation();delItem('${item.id}')">✕</button>
      </div>`;
    } else if (!item.sectionId) {
      rendered.add(item.id); qNum++;
      html += `<div class="q-item ${S.activeId===item.id&&!S.editingScreen?'active':''}" onclick="setActive('${item.id}')" ${dragEvents(item.id)}>
        <div class="q-num">${qNum}</div>
        <div class="q-info"><div class="q-type-lbl">${TYPES[item.type]?.icon} ${TYPES[item.type]?.label||item.type}</div><div class="q-lbl">${esc(item.question||'Untitled')}</div></div>
        <button class="q-del" onclick="event.stopPropagation();delItem('${item.id}')">✕</button>
      </div>`;
    }
  });
  html += `<div class="screen-list-item ${S.editingScreen==='end'?'active':''}" onclick="editScreen('end')"><span class="screen-list-icon">🏁</span><span>Ending Screen</span></div>`;
  el.innerHTML = html;
}

function renderEditor() {
  const stack = document.getElementById('editorStack');
  if (S.editingScreen) { stack.innerHTML = renderScreenEditor(S.editingScreen); initDrawCanvas(S.editingScreen); return; }
  const item = getActive();
  if (!item) { stack.innerHTML=`<div class="empty-state"><div class="empty-ico">✏️</div><div class="empty-ttl">Select an item</div><div class="empty-sub">or add a question, section, or matrix</div></div>`; return; }
  if (item.kind==='section') stack.innerHTML = renderSectionEditor(item);
  else if (item.kind==='matrix') stack.innerHTML = renderMatrixEditor(item);
  else stack.innerHTML = renderQEditor(item);
  syncRightPanel();
}

/* ── Screen Editor ── */
function editScreen(which) { S.editingScreen=which; S.activeId=null; renderAll(); }

function renderScreenEditor(which) {
  const isW = which==='welcome';
  const sc = isW ? S.settings.welcome : S.settings.end;
  const badgeCls = isW ? 'welcome-badge' : 'end-badge';
  return `<div class="screen-editor">
    <div class="ed-head">
      <div class="type-badge ${badgeCls}">${isW?'🏠 Welcome Screen':'🏁 Ending Screen'}</div>
      <div style="font-size:11px;color:var(--muted)">${isW?'First slide respondents see':'Shown after form submits — no submit button'}</div>
    </div>
    <div class="ed-body">
      <div class="field-row"><label class="lbl">Headline</label>
        <input class="fi" value="${esc(sc.title)}" oninput="updScreen('${which}','title',this.value)" placeholder="Main title text"></div>
      <div class="field-row"><label class="lbl">Subtitle / Description</label>
        <textarea class="fi" oninput="updScreen('${which}','subtitle',this.value)">${esc(sc.subtitle)}</textarea></div>
      ${isW?`<div class="field-row"><label class="lbl">Start Button Text</label>
        <input class="fi" value="${esc(sc.buttonText||"Let's go →")}" oninput="updScreen('welcome','buttonText',this.value)"></div>`:''}
      <div class="field-row"><label class="lbl">Drawing / Decoration</label>
        <div class="drawing-area">
          <div class="draw-tools" id="dt-${which}">
            <button class="draw-tool-btn active" onclick="setDrawTool('${which}','pen',this)" title="Pen">✏️</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','line',this)" title="Line">⟋</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','rect',this)" title="Rect">▭</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','circle',this)" title="Circle">◯</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','arrow',this)" title="Arrow">→</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','text',this)" title="Text">T</button>
            <button class="draw-tool-btn" onclick="setDrawTool('${which}','eraser',this)" title="Eraser">🧹</button>
            <div class="draw-sep"></div>
            ${['#1a1a2e','#5b3ef8','#00b89c','#e03e3e','#d4890a','#0088cc','#e06e9f'].map(c=>`<div class="draw-color-swatch ${c==='#1a1a2e'?'active':''}" style="background:${c}" onclick="setDrawColor('${which}','${c}',this)"></div>`).join('')}
            <div class="draw-sep"></div>
            <input type="number" class="draw-size-inp" id="ds-${which}" value="3" min="1" max="40">
            <div style="flex:1"></div>
            <button class="btn-icon" onclick="clearDrawing('${which}')" title="Clear">🗑</button>
          </div>
          <canvas class="draw-canvas" id="dc-${which}" width="640" height="200"></canvas>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">Draw decorations shown on the ${which} screen</div>
      </div>
    </div>
  </div>`;
}

/* ── Draw engine ── */
const drawState = {};
function initDrawCanvas(which) {
  const canvas = document.getElementById(`dc-${which}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const sc = which==='welcome' ? S.settings.welcome : S.settings.end;
  canvas.width = canvas.parentElement.clientWidth || 640;
  canvas.height = 200;
  drawState[which] = {tool:'pen',color:'#1a1a2e',size:3,drawing:false,startX:0,startY:0,snapshot:null};
  const ds = drawState[which];
  ctx.fillStyle = '#f4f6fb'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if (sc.drawing) { const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0); img.src=sc.drawing; }

  function getPos(e) {
    const rect=canvas.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-rect.left)*(canvas.width/rect.width),y:(cy-rect.top)*(canvas.height/rect.height)};
  }
  function startDraw(e) {
    e.preventDefault(); const pos=getPos(e); ds.drawing=true; ds.startX=pos.x; ds.startY=pos.y;
    ds.snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);
    if(ds.tool==='pen'||ds.tool==='eraser'){ctx.beginPath();ctx.moveTo(pos.x,pos.y);}
    else if(ds.tool==='text'){const t=prompt('Text:','Label');if(t){ctx.font=`${Math.max(14,ds.size*4)}px ${S.settings.font||'Syne'}`;ctx.fillStyle=ds.color;ctx.fillText(t,pos.x,pos.y);saveDrawing(which,canvas);}ds.drawing=false;}
  }
  function draw(e) {
    if(!ds.drawing) return; e.preventDefault(); const pos=getPos(e);
    if(ds.tool==='pen'){ctx.lineWidth=ds.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=ds.color;ctx.lineTo(pos.x,pos.y);ctx.stroke();}
    else if(ds.tool==='eraser'){ctx.lineWidth=ds.size*4;ctx.lineCap='round';ctx.globalCompositeOperation='destination-out';ctx.lineTo(pos.x,pos.y);ctx.stroke();ctx.globalCompositeOperation='source-over';}
    else{
      ctx.putImageData(ds.snapshot,0,0); ctx.strokeStyle=ds.color; ctx.fillStyle=ds.color; ctx.lineWidth=ds.size; ctx.setLineDash([]);
      if(ds.tool==='line'){ctx.beginPath();ctx.moveTo(ds.startX,ds.startY);ctx.lineTo(pos.x,pos.y);ctx.stroke();}
      else if(ds.tool==='rect'){ctx.strokeRect(ds.startX,ds.startY,pos.x-ds.startX,pos.y-ds.startY);}
      else if(ds.tool==='circle'){const rx=Math.abs(pos.x-ds.startX)/2,ry=Math.abs(pos.y-ds.startY)/2,cx=ds.startX+(pos.x-ds.startX)/2,cy=ds.startY+(pos.y-ds.startY)/2;ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();}
      else if(ds.tool==='arrow'){const dx=pos.x-ds.startX,dy=pos.y-ds.startY,ang=Math.atan2(dy,dx),hs=12+ds.size*2;ctx.beginPath();ctx.moveTo(ds.startX,ds.startY);ctx.lineTo(pos.x,pos.y);ctx.stroke();ctx.beginPath();ctx.moveTo(pos.x,pos.y);ctx.lineTo(pos.x-hs*Math.cos(ang-Math.PI/6),pos.y-hs*Math.sin(ang-Math.PI/6));ctx.lineTo(pos.x-hs*Math.cos(ang+Math.PI/6),pos.y-hs*Math.sin(ang+Math.PI/6));ctx.closePath();ctx.fill();}
    }
  }
  function endDraw(e){if(!ds.drawing)return;ds.drawing=false;saveDrawing(which,canvas);}
  canvas.addEventListener('mousedown',startDraw); canvas.addEventListener('mousemove',draw); canvas.addEventListener('mouseup',endDraw); canvas.addEventListener('mouseleave',endDraw);
  canvas.addEventListener('touchstart',startDraw,{passive:false}); canvas.addEventListener('touchmove',draw,{passive:false}); canvas.addEventListener('touchend',endDraw);
  const si=document.getElementById(`ds-${which}`); if(si) si.oninput=()=>{ds.size=+si.value;};
}
function saveDrawing(w,c){const sc=w==='welcome'?S.settings.welcome:S.settings.end;sc.drawing=c.toDataURL('image/png');autoSave();}
function setDrawTool(w,t,btn){drawState[w].tool=t;document.querySelectorAll(`#dt-${w} .draw-tool-btn`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setDrawColor(w,c,el){drawState[w].color=c;el.closest('.draw-tools').querySelectorAll('.draw-color-swatch').forEach(e=>e.classList.remove('active'));el.classList.add('active');}
function clearDrawing(w){const c=document.getElementById(`dc-${w}`);if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#f4f6fb';ctx.fillRect(0,0,c.width,c.height);const sc=w==='welcome'?S.settings.welcome:S.settings.end;sc.drawing=null;autoSave();}
function updScreen(w,f,v){const sc=w==='welcome'?S.settings.welcome:S.settings.end;sc[f]=v;autoSave();}

/* ── Section Editor ── */
function renderSectionEditor(sec) {
  const children = S.items.filter(q=>q.kind==='question'&&q.sectionId===sec.id);
  const childCards = children.map((q,i)=>`
    <div class="sec-q-card">
      <div class="q-num">${i+1}</div>
      <div class="q-info" style="flex:1"><div class="q-type-lbl">${TYPES[q.type]?.icon} ${TYPES[q.type]?.label}</div><div class="q-lbl">${esc(q.question||'Untitled')}</div></div>
      <button class="btn-icon" onclick="setActive('${q.id}')" title="Edit">✎</button>
    </div>`).join('');
  const addBtnsHtml = `<div style="display:flex;gap:5px;flex-wrap:wrap;padding:10px 0 6px">${Object.entries(TYPES).map(([t,{icon,label}])=>`<button class="btn btn-ghost btn-sm" onclick="addQ('${t}','${sec.id}')" style="font-size:10px">${icon} ${label}</button>`).join('')}</div>`;
  return `<div class="sec-editor">
    <div class="ed-head"><div class="type-badge sec-badge">§ Section</div><div style="font-size:11px;color:var(--muted)">All questions on one screen</div></div>
    <div class="ed-body">
      <div class="field-row"><label class="lbl">Section Title</label><input class="fi" value="${esc(sec.title||'')}" oninput="updItem('${sec.id}','title',this.value)"></div>
      <div class="field-row"><label class="lbl">Description</label><input class="fi" value="${esc(sec.description||'')}" oninput="updItem('${sec.id}','description',this.value)" placeholder="Optional context..."></div>
      <div class="field-row"><label class="lbl">Questions in this section</label>
        <div class="sec-q-list">${childCards||'<div style="font-size:12px;color:var(--muted);padding:8px 0">No questions yet — add below</div>'}</div>
        ${addBtnsHtml}
      </div>
    </div>
    ${renderSectionLogic(sec)}
  </div>`;
}
function renderSectionLogic(sec){
  const rules=sec.logic||[];
  const allOpts=S.items.filter(q=>q.kind==='question'&&q.sectionId===sec.id&&['choice','yesno','three','dropdown','multibutton'].includes(q.type)).flatMap(q=>(q.options||['Yes','No']).map(o=>({qid:q.id,ql:q.question?.slice(0,20)||'Q',opt:o})));
  const ruleHtml=rules.map((r,i)=>{
    const oH=allOpts.map(o=>`<option value="${o.qid}::${esc(o.opt)}" ${r.ifQid===o.qid&&r.ifValue===o.opt?'selected':''}>[${esc(o.ql)}] ${esc(o.opt)}</option>`).join('');
    const gH=getSectionGotoOptions(sec.id,r.goto);
    return `<div class="logic-rule"><span style="font-size:11px;color:var(--muted)">If</span><select onchange="updSecLogic('${sec.id}',${i},'ifQid_ifValue',this.value)">${oH||'<option>— add choice Q first —</option>'}</select><span class="logic-arrow">→</span><select onchange="updSecLogic('${sec.id}',${i},'goto',this.value)">${gH}</select><button class="btn-icon" onclick="delSecLogic('${sec.id}',${i})" style="margin-left:auto">✕</button></div>`;
  }).join('');
  return `<div class="logic-wrap"><div class="logic-title"><span>⚡ Section Logic</span><button class="btn btn-ghost btn-sm" onclick="addSecLogic('${sec.id}')">+ Rule</button></div>${ruleHtml||'<div style="font-size:11px;color:var(--muted)">No rules yet.</div>'}</div>`;
}
function getSectionGotoOptions(secId,cur){
  let html=`<option value="">Next</option><option value="__end__" ${cur==='__end__'?'selected':''}>End</option>`;
  S.items.filter(i=>i.kind==='section'&&i.id!==secId).forEach(s=>{html+=`<option value="${s.id}" ${cur===s.id?'selected':''}>Section: ${esc(s.title||'?')}</option>`;});
  S.items.filter(i=>i.kind==='question'&&!i.sectionId).forEach(q=>{html+=`<option value="${q.id}" ${cur===q.id?'selected':''}>Q: ${esc((q.question||'').slice(0,28))}</option>`;});
  return html;
}

/* ════════════════════════════════════════════
   MATRIX EDITOR
════════════════════════════════════════════ */
function renderMatrixEditor(mat) {
  const cols = mat.columns || [];
  const rows = mat.rows || [];

  const colChips = cols.map((c,i)=>`
    <div class="mat-col-chip">
      <input class="mat-col-inp" value="${esc(c)}" oninput="updMatCol(${i},this.value)" placeholder="Col ${i+1}">
      <button onclick="delMatCol(${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:0 2px">✕</button>
    </div>`).join('');

  const rowCards = rows.map((r,i)=>{
    const typeOpts = MAT_ROW_TYPES.map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('');
    // Mini preview of how row inputs look
    const previewCell = buildMatCellPreview(r.type);
    const colPreview = cols.map(()=>`<td style="padding:4px 8px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border)">${previewCell}</td>`).join('');

    return `<div class="mat-row-card">
      <div class="mat-row-head">
        <span class="mat-row-q">${i+1}. ${esc(r.label||'Row '+i)}</span>
        <span class="mat-row-type-badge">${r.type}</span>
        <button class="btn-icon" onclick="delMatRow('${mat.id}',${i})">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:8px">
        <input class="fi" style="font-size:12px" value="${esc(r.label||'')}" oninput="updMatRow('${mat.id}',${i},'label',this.value)" placeholder="Row label (question)">

function renderQEditor(q) {
  const ti = TYPES[q.type]||{};
  let body = `
    <div class="field-row"><label class="lbl">Question text</label><input class="fi" value="${esc(q.question)}" oninput="updItem('${q.id}','question',this.value)"></div>
    <div class="field-row"><label class="lbl">Description (optional)</label><input class="fi" value="${esc(q.description||'')}" oninput="updItem('${q.id}','description',this.value)" placeholder="Context..."></div>`;
  if (['choice','dropdown','multibutton'].includes(q.type)) {
    body += `<div class="field-row"><label class="lbl">Options</label>
      <div class="opt-list">${(q.options||[]).map((o,i)=>`<div class="opt-item"><span class="drag-h">⠿</span><input class="opt-inp" value="${esc(o)}" oninput="updOpt('${q.id}',${i},this.value)"><button class="opt-del" onclick="delOpt('${q.id}',${i})">✕</button></div>`).join('')}</div>
      <button class="add-opt-btn" onclick="addOpt('${q.id}')">+ Add option</button></div>`;
  }
  if (q.type==='three') {
    const opts=q.options||['A','B','C']; const icons=q.icons||['','',''];
    body += `<div class="field-row"><label class="lbl">3 Options</label><div class="opt-list">${[0,1,2].map(i=>`<div class="opt-item"><span class="drag-h">${['🅐','🅑','🅒'][i]}</span><input class="opt-inp" value="${esc(opts[i]||'')}" oninput="updThreeOpt('${q.id}',${i},this.value)" placeholder="Option ${i+1}"><input class="opt-inp" value="${esc(icons[i]||'')}" oninput="updThreeIcon('${q.id}',${i},this.value)" placeholder="emoji" style="width:44px"></div>`).join('')}</div></div>`;
  }
  if (q.type==='picturebutton') {
    const pics=q.pictures||[];
    body += `<div class="field-row"><label class="lbl">Picture cards</label><div class="pic-grid">
      ${pics.map((p,i)=>`<div class="pic-slot" onclick="triggerPicUp('${q.id}',${i})">${p.url?`<img src="${p.url}" alt="">`:`<div class="pic-slot-ov"><span style="font-size:20px">🖼️</span><span>Upload</span></div>`}<div class="pic-slot-lbl">${esc(p.label||`Opt ${i+1}`)}</div><div class="pic-slot-actions"><button class="btn-icon" onclick="event.stopPropagation();updPicLbl('${q.id}',${i})" title="Edit">✎</button><button class="btn-icon" style="color:var(--danger)" onclick="event.stopPropagation();delPic('${q.id}',${i})">✕</button></div></div><input type="file" id="pi-${q.id}-${i}" accept="image/*" style="display:none" onchange="handlePicUp('${q.id}',${i},this)">`).join('')}
      <div class="add-pic-slot" onclick="addPic('${q.id}')"><span style="font-size:20px">+</span><span>Add</span></div>
    </div></div>`;
  }
  if (q.type==='scale') {
    body += `<div class="two-col"><div class="field-row"><label class="lbl">Min label</label><input class="fi" style="font-size:12px" value="${esc(q.scaleMinLabel||'Not at all')}" oninput="updItem('${q.id}','scaleMinLabel',this.value)"></div><div class="field-row"><label class="lbl">Max label</label><input class="fi" style="font-size:12px" value="${esc(q.scaleMaxLabel||'Completely')}" oninput="updItem('${q.id}','scaleMaxLabel',this.value)"></div></div>`;
  }
  const canLogic = ['choice','yesno','three','dropdown','multibutton'].includes(q.type) && !q.sectionId;
  const logicHtml = canLogic ? renderQLogic(q) : (q.sectionId ? `<div class="logic-wrap"><div style="font-size:11px;color:var(--muted)">Logic for section-grouped questions is set on the section.</div></div>` : '');
  return `<div class="q-editor">
    <div class="ed-head"><div class="type-badge">${ti.icon} ${ti.label||q.type}</div>${q.required?'<span style="font-size:10px;background:rgba(224,62,62,.07);border:1px solid rgba(224,62,62,.2);color:var(--danger);padding:2px 8px;border-radius:100px;font-weight:600">Required</span>':''}</div>
    <div class="ed-body">${body}</div>
    ${logicHtml}
  </div>`;
}
function renderQLogic(q) {
  const rules=q.logic||[], opts=q.options||['Yes','No'];
  const rH=rules.map((r,i)=>{
    const oH=opts.map(o=>`<option value="${esc(o)}" ${r.ifValue===o?'selected':''}>${esc(o)}</option>`).join('');
    const gH=getQGotoOptions(q.id,r.goto);
    return `<div class="logic-rule"><span style="font-size:11px;color:var(--muted)">If answer</span><select onchange="updQLogic('${q.id}',${i},'condition',this.value)"><option value="is" ${r.condition==='is'?'selected':''}>is</option><option value="contains" ${r.condition==='contains'?'selected':''}>contains</option></select><select onchange="updQLogic('${q.id}',${i},'ifValue',this.value)">${oH}</select><span class="logic-arrow">→</span><select onchange="updQLogic('${q.id}',${i},'goto',this.value)">${gH}</select><button class="btn-icon" onclick="delQLogic('${q.id}',${i})" style="margin-left:auto">✕</button></div>`;
  }).join('');
  return `<div class="logic-wrap"><div class="logic-title"><span>⚡ Logic / Branching</span><button class="btn btn-ghost btn-sm" onclick="addQLogic('${q.id}')">+ Rule</button></div>${rH||'<div style="font-size:11px;color:var(--muted)">No rules yet.</div>'}</div>`;
}
function getQGotoOptions(qid,cur) {
  const idx=S.items.findIndex(i=>i.id===qid);
  let html=`<option value="">Next</option><option value="__end__" ${cur==='__end__'?'selected':''}>End</option>`;
  S.items.forEach((item,i)=>{
    if(i<=idx) return;
    if(item.kind==='section') html+=`<option value="${item.id}" ${cur===item.id?'selected':''}>Section: ${esc(item.title||'?')}</option>`;
    else if(item.kind==='matrix') html+=`<option value="${item.id}" ${cur===item.id?'selected':''}>Matrix: ${esc(item.title||'?')}</option>`;
    else if(!item.sectionId) html+=`<option value="${item.id}" ${cur===item.id?'selected':''}>Q: ${esc((item.question||'').slice(0,28))}</option>`;
  });
  return html;
}

/* ── DRAG AND DROP REORDERING ── */
let dragId = null;
function dragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; e.target.style.opacity = '0.5'; }
function dragEnd(e) { e.target.style.opacity = '1'; dragId = null; document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target')); }
function dragOver(e) { 
  e.preventDefault(); 
  const t = e.target.closest('.q-item, .sec-item, .mat-item, .sec-q-item'); 
  if(t) { 
    document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target')); 
    t.classList.add('drop-target'); 
  } 
}
function dropItemOn(e, targetId) {
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  if(!dragId || dragId === targetId) return;

  const dragIdx = S.items.findIndex(i => i.id === dragId);
  let dropIdx = S.items.findIndex(i => i.id === targetId);
  if(dragIdx < 0 || dropIdx < 0) return;

  const dragged = S.items[dragIdx];
  const target = S.items[dropIdx];

  // Logic: Group items into sections if dropped inside one
  if (dragged.kind !== 'section') {
    if (target.kind === 'section') dragged.sectionId = target.id;
    else if (target.sectionId) dragged.sectionId = target.sectionId;
    else dragged.sectionId = null;
  }

  // Move the item in the array
  S.items.splice(dragIdx, 1);
  dropIdx = S.items.findIndex(i => i.id === targetId); // recalculate index
  S.items.splice(dropIdx, 0, dragged);

  // If a whole section is moved, bring its children with it
  if (dragged.kind === 'section') {
    const children = S.items.filter(i => i.sectionId === dragged.id);
    S.items = S.items.filter(i => i.sectionId !== dragged.id);
    const newSecIdx = S.items.findIndex(i => i.id === dragged.id);
    S.items.splice(newSecIdx + 1, 0, ...children);
  }

  renderAll(); autoSave();
}

════════════════════════════════════════════ */
function exportQuestionsCSV(){
  const hdr=['id','kind','type','question','description','options','required','ratingMax','scaleMin','scaleMax','scaleMinLabel','scaleMaxLabel','sectionId','matrixTitle','matrixColumns','matrixRows'];
  const rows=S.items.map(item=>{
    if(item.kind==='question'){
      return [item.id,'question',item.type||'',item.question||'',item.description||'',(item.options||[]).join('|'),item.required?'true':'false',item.ratingMax||'',item.scaleMin??'',item.scaleMax??'',item.scaleMinLabel||'',item.scaleMaxLabel||'',item.sectionId||'','','',''];
    } else if(item.kind==='section'){
      return [item.id,'section','','',item.description||'','','','','','','','','','',item.title||'',''];
    } else if(item.kind==='matrix'){
      const rowsJson=JSON.stringify((item.rows||[]).map(r=>({label:r.label||'',type:r.type||'radio'})));
      return [item.id,'matrix','',item.title||'',item.description||'','','','','','','','','',item.title||'',(item.columns||[]).join('|'),rowsJson];
    }
    return [];
  }).filter(r=>r.length);
  const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl(csv,'text/csv',S.settings.title+'-questions.csv');
  toast('Questions exported ↓');
}

/* ── IMPORT CSV ── */
function handleCSVImport(inp){
  const file=inp.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const rows=parseCSV(e.target.result);
      if(!rows.length){toast('No data found in CSV');return;}
      const hdr=rows[0].map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
      const idxOf=n=>hdr.indexOf(n);
      const get=(row,n)=>row[idxOf(n)]?.trim()||'';
      const imported=[];
      for(let i=1;i<rows.length;i++){
        const row=rows[i]; if(!row||row.every(c=>!c.trim())) continue;
        const kind=get(row,'kind')||'question';
        const newId=uid();
        if(kind==='section'){
          const title=get(row,'matrixtitle')||get(row,'question')||'New Section';
          imported.push({id:newId,kind:'section',title,description:get(row,'description'),logic:[]});
        } else if(kind==='matrix'){
          const cols=(get(row,'matrixcolumns')||'').split('|').filter(Boolean);
          let mrows=[];
          try{mrows=JSON.parse(get(row,'matrixrows')||'[]').map(r=>({id:uid(),label:r.label||'Row',type:r.type||'radio'}));}catch(e2){mrows=[{id:uid(),label:'Row 1',type:'radio'}];}
          imported.push({id:newId,kind:'matrix',title:get(row,'matrixtitle')||get(row,'question')||'Matrix',description:get(row,'description'),columns:cols.length?cols:['A','B','C'],rows:mrows});
        } else {
          const type=get(row,'type')||'short';
          const options=(get(row,'options')||'').split('|').filter(Boolean);
          const q={id:newId,kind:'question',type,question:get(row,'question')||'New Question',description:get(row,'description'),required:get(row,'required')==='true',sectionId:null};
          if(options.length) q.options=options;
          if(get(row,'ratingmax')) q.ratingMax=+get(row,'ratingmax')||10;
          if(get(row,'scalemin')!=='') q.scaleMin=+get(row,'scalemin')||0;
          if(get(row,'scalemax')!=='') q.scaleMax=+get(row,'scalemax')||10;
          if(get(row,'scaleminlabel')) q.scaleMinLabel=get(row,'scaleminlabel');
          if(get(row,'scalemaxlabel')) q.scaleMaxLabel=get(row,'scalemaxlabel');
          imported.push(q);
        }
      }
      if(!imported.length){toast('No valid rows found');return;}
      const mode=confirm(`Import ${imported.length} items?\nOK = add to existing\nCancel = replace all`);
      if(mode) S.items.push(...imported);
      else S.items=imported;
      S.activeId=imported[0]?.id||null; renderAll(); autoSave();
      toast(`✓ Imported ${imported.length} items`);
    }catch(err){toast('CSV parse error: '+err.message);}
  };
  reader.readAsText(file);
  inp.value='';
}

function parseCSV(text){
  const rows=[]; let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];
    if(inQ){if(ch==='"'&&nx==='"'){cell+='"';i++;}else if(ch==='"'){inQ=false;}else cell+=ch;}
    else{if(ch==='"'){inQ=true;}else if(ch===','){row.push(cell);cell='';}else if(ch==='\r'&&nx==='\n'){row.push(cell);cell='';rows.push(row);row=[];i++;}else if(ch==='\n'||ch==='\r'){row.push(cell);cell='';rows.push(row);row='';}else cell+=ch;}
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows.filter(r=>r.length>0);
}

let slideMap=[];
function launchPreview(){
  S.views++; S.currentSlide=0; S.submitted=false;
  const prog=loadRespondentProgress();
  S.answers=prog&&prog.formTitle===S.settings.title?prog.answers||{}:{};
  document.getElementById('prevTitle').textContent=S.settings.title;
  buildSlideMap(); buildPreviewDOM(); goSlide(0);
}
function buildSlideMap(){
  slideMap=[{type:'welcome',id:'welcome'}];
  const rendered=new Set();
  S.items.forEach(item=>{
    if(rendered.has(item.id)) return;
    if(item.kind==='section'){rendered.add(item.id);S.items.filter(q=>q.kind==='question'&&q.sectionId===item.id).forEach(q=>rendered.add(q.id));slideMap.push({type:'section',id:item.id});}
    else if(item.kind==='matrix'){rendered.add(item.id);slideMap.push({type:'matrix',id:item.id});}
    else if(item.kind==='question'&&!item.sectionId){rendered.add(item.id);slideMap.push({type:'question',id:item.id});}
  });
  slideMap.push({type:'end',id:'end'});
}
function buildPreviewDOM(){
  const view=document.getElementById('formView');
  const prog=loadRespondentProgress();
  const hasProg=prog&&prog.formTitle===S.settings.title&&Object.keys(prog.answers||{}).length>0;
  view.innerHTML=slideMap.map(sm=>{
    if(sm.type==='welcome') return buildWelcomeSlide(hasProg,prog);
    if(sm.type==='end') return buildEndSlide();
    if(sm.type==='question'){const q=S.items.find(i=>i.id===sm.id);return q?buildQSlide(q,getQNumber(q.id)):'';}
    if(sm.type==='section'){const s=S.items.find(i=>i.id===sm.id);return s?buildSectionSlide(s):'';}
    if(sm.type==='matrix'){const m=S.items.find(i=>i.id===sm.id);return m?buildMatrixSlide(m):'';}
    return '';
  }).join('');
}

function getQNumber(qid){let n=0;for(const item of S.items){if(item.kind==='question'){n++;if(item.id===qid)return n;}}return n;}
function totalQs(){return S.items.filter(i=>i.kind==='question').length;}
