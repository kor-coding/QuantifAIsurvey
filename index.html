function buildQSlide(q,num){
  const req=q.required?`<span class="req-badge">Required</span>`:'';
  const isLast=isLastSlideItem(q.id);
  const inp=buildQInput(q);
  const backBtn=slideMap.findIndex(s=>s.id===q.id)>1?`<button class="btn-back" onclick="prevSlide()">↑ Back</button>`:'';
  const nextCls=isLast?'btn-next btn-submit':'btn-next';
  const skipBtn=!q.required?`<button class="btn-skip" onclick="skipSlide()">Skip →</button>`:'';
  return `<div class="form-slide slide-up" id="sl-${q.id}"><div class="slide-inner">
    <div class="slide-num">${num} of ${totalQs()}</div>
    <h2 class="slide-q">${esc(q.question)}${req}</h2>
    ${q.description?`<p class="slide-desc">${esc(q.description)}</p>`:''}
    ${inp}
    <div class="s-nav">${backBtn}<button class="${nextCls}" onclick="${isLast?'submitForm()':'nextSlide()'}">
      ${isLast?'Submit →':'OK ✓'}
    </button>${skipBtn}</div>
    ${isLast?'':`<div class="kbd-hint"><kbd>Enter</kbd> to continue</div>`}
  </div></div>`;
}

function buildSectionSlide(sec){
  const children=S.items.filter(q=>q.kind==='question'&&q.sectionId===sec.id);
  const secIdx=slideMap.findIndex(s=>s.id===sec.id);
  const isLast=isLastSlideItem(sec.id);
  const qBlocks=children.map(q=>{
    const req=q.required?`<span class="req-badge">Required</span>`:'';
    return `<div style="display:flex;flex-direction:column">
      <div class="slide-q" style="font-size:clamp(17px,2.3vw,24px);margin-bottom:4px">${esc(q.question)}${req}</div>
      ${q.description?`<p class="slide-desc" style="margin-bottom:14px">${esc(q.description)}</p>`:''}
      ${buildQInput(q)}
    </div>`;
  }).join('');
  const nextCls=isLast?'btn-next btn-submit':'btn-next';
  const backBtn=secIdx>1?`<button class="btn-back" onclick="prevSlide()">↑ Back</button>`:'';
  return `<div class="section-slide slide-up" id="sl-${sec.id}"><div class="section-slide-inner">
    <div class="section-header">
      <div class="slide-num">Section · ${children.length} question${children.length!==1?'s':''}</div>
      <h2 style="font-family:var(--fd);font-size:clamp(20px,2.8vw,32px);font-weight:600;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px;color:var(--text)">${esc(sec.title||'Section')}</h2>
      ${sec.description?`<p class="slide-desc" style="margin-bottom:0">${esc(sec.description)}</p>`:''}
    </div>
    <div class="section-qs">${qBlocks}</div>
    <div class="s-nav" style="margin-top:28px;padding-bottom:28px">
      ${backBtn}<button class="${nextCls}" onclick="${isLast?'submitForm()':'nextSlide()'}">
        ${isLast?'Submit →':'Continue →'}
      </button>
    </div>
  </div></div>`;
}

function buildMatrixSlide(mat){
  const cols=mat.columns||[];
  const rows=mat.rows||[];
  const isLast=isLastSlideItem(mat.id);
  const matIdx=slideMap.findIndex(s=>s.id===mat.id);
  const backBtn=matIdx>1?`<button class="btn-back" onclick="prevSlide()">↑ Back</button>`:'';
  const nextCls=isLast?'btn-next btn-submit':'btn-next';
  if(!S.answers[mat.id]) S.answers[mat.id]={};

  const tbody=rows.map(row=>{
    const cells=cols.map(col=>{
      const key=`${row.id}::${col}`;
      const curVal=S.answers[mat.id][key];
      return `<td style="padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border)">${buildMatCell(mat.id,row,col,key,curVal)}</td>`;
    }).join('');
    return `<tr><td style="padding:8px 14px;font-weight:600;font-size:13px;color:var(--text);background:var(--surface2);border-bottom:1px solid var(--border);border-right:2px solid var(--border);white-space:nowrap">${esc(row.label)} <span class="mat-row-type-badge" style="font-size:8px;padding:1px 5px">${row.type}</span></td>${cells}</tr>`;
  }).join('');

  return `<div class="section-slide slide-up" id="sl-${mat.id}"><div class="section-slide-inner">
    <div class="section-header">
      <div class="slide-num"><div class="pill pill-orange" style="display:inline-flex">⊞ Matrix</div></div>
      <h2 style="font-family:var(--fd);font-size:clamp(20px,2.8vw,32px);font-weight:600;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px;color:var(--text)">
        ${esc(mat.title||'Matrix')}
        ${mat.required ? `<span class="req-badge" style="margin-left:8px">Required</span>` : ''}
      </h2>
      ${mat.description?`<p class="slide-desc" style="margin-bottom:0">${esc(mat.description)}</p>`:''}
    </div>
    <div style="flex:1">
      <div class="matrix-table-wrap">
        <table class="matrix-table">
          <thead><tr>
            <th style="text-align:left">Question</th>
            ${cols.map(c=>`<th>${esc(c)}</th>`).join('')}
          </tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>
    <div class="s-nav" style="margin-top:28px;padding-bottom:28px">
      ${backBtn}<button class="${nextCls}" onclick="${isLast?'submitForm()':'nextSlide()'}">
        ${isLast?'Submit →':'Continue →'}
      </button>
    </div>
  </div></div>`;
}

function buildMatCell(matId,row,col,key,curVal){
  const safeKey=key.replace(/['"]/g,'_');
  switch(row.type){
    case 'short': return `<input class="mat-cell-short" placeholder="…" value="${esc(curVal||'')}" oninput="updMatAnswer('${matId}','${safeKey}',this.value)">`;
    case 'number': return `<input class="mat-cell-num" type="number" placeholder="0" value="${esc(curVal||'')}" oninput="updMatAnswer('${matId}','${safeKey}',this.value)">`;
    case 'checkbox': return `<input class="mat-cell-chk" type="checkbox" ${curVal?'checked':''} onchange="updMatAnswer('${matId}','${safeKey}',this.checked)">`;
    case 'radio': return `<input class="mat-cell-radio" type="radio" name="mat-${matId}-${row.id}" ${curVal===col?'checked':''} onchange="updMatAnswer('${matId}','${safeKey}',this.checked?'${esc(col)}':'')">`;
    case 'rating':
      const ratingVal=+curVal||0;
      return `<div class="mat-stars" style="display:flex;gap:2px;justify-content:center">${[1,2,3,4,5].map(n=>`<span class="mat-star ${n<=ratingVal?'lit':''}" onclick="rateMatCell('${matId}','${safeKey}',${n},this)">★</span>`).join('')}</div>`;
    case 'scale': 
      // ← NEW: Clear 1–5 labels for better UX
      const scaleVal = +curVal || 3;
      return `
        <div style="display:flex;align-items:center;gap:8px;width:100%;max-width:240px;margin:0 auto">
          <span style="font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap">1</span>
          <input class="mat-cell-range" type="range" min="1" max="5" value="${scaleVal}" 
                 style="--pct:${((scaleVal-1)/4)*100}" 
                 oninput="updMatAnswer('${matId}','${safeKey}',+this.value);this.style.setProperty('--pct',((+this.value-1)/4)*100)" 
                 title="${scaleVal}">
          <span style="font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap">5</span>
        </div>`;
    default: return `<input class="mat-cell-short" value="${esc(curVal||'')}" oninput="updMatAnswer('${matId}','${safeKey}',this.value)">`;
  }
}

function updMatAnswer(matId,key,val){if(!S.answers[matId])S.answers[matId]={};S.answers[matId][key]=val;autoSaveProgress();}
function rateMatCell(matId,key,n,el){
  const stars=el.parentElement.querySelectorAll('.mat-star');
  stars.forEach((s,i)=>s.classList.toggle('lit',i<n));
  updMatAnswer(matId,key,n);
}

function isLastSlideItem(id){return slideMap.findIndex(s=>s.id===id)===slideMap.length-2;}

/* ── Build question inputs ── */
function buildQInput(q){
  switch(q.type){
    case 'short': return `<input class="s-input" type="text" id="a-${q.id}" placeholder="Type your answer…" value="${esc(String(S.answers[q.id]||''))}" oninput="S.answers['${q.id}']=this.value;autoSaveProgress()">`;
    case 'email': return `<input class="s-input" type="email" id="a-${q.id}" placeholder="your@email.com" value="${esc(String(S.answers[q.id]||''))}" oninput="S.answers['${q.id}']=this.value;autoSaveProgress()">`;
    case 'number': return `<input class="s-input" type="number" id="a-${q.id}" placeholder="0" value="${esc(String(S.answers[q.id]||''))}" oninput="S.answers['${q.id}']=this.value;autoSaveProgress()">`;
    case 'long': return `<textarea class="s-input" id="a-${q.id}" placeholder="Type your answer…" style="min-height:80px;resize:none" oninput="S.answers['${q.id}']=this.value;autoSaveProgress()">${esc(String(S.answers[q.id]||''))}</textarea>`;
    case 'yesno': return buildChoiceInput(q,['Yes','No'],false);
    case 'choice': return buildChoiceInput(q,q.options||[],!!q.multiple,q.other);
    case 'multibutton': return buildMultiButton(q);
    case 'three': return buildThreeOptions(q);
    case 'picturebutton': return buildPicButtons(q);
    case 'dropdown': return buildDropdown(q);
    case 'rating': return buildRating(q);
    case 'scale': return buildScale(q);
    case 'date': return buildDate(q);
    default: return `<input class="s-input" id="a-${q.id}" placeholder="…" oninput="S.answers['${q.id}']=this.value">`;
  }
}
function buildChoiceInput(q,opts,multi,other){
  const letters='ABCDEFGHIJKLMNOP';
  const cur=S.answers[q.id];
  const isSel=v=>multi?(Array.isArray(cur)&&cur.includes(v)):cur===v;
  const items=opts.map((o,i)=>`<div class="s-opt ${isSel(o)?'selected':''}" data-val="${esc(o)}" onclick="chooseOpt('${q.id}',this,${multi})"><span class="opt-key">${letters[i]}</span>${esc(o)}</div>`).join('');
  const otherBtn=other?`<div class="s-opt" data-val="__other__" onclick="chooseOtherOpt('${q.id}',this)"><span class="opt-key">✎</span>Other…</div>`:'';
  return `<div class="s-opts" id="a-${q.id}">${items}${otherBtn}</div>`;
}
function buildMultiButton(q){
  const opts=q.options||[],cur=S.answers[q.id]||[];
  return `<div class="mb-grid" id="a-${q.id}">${opts.map(o=>`<div class="mb-btn ${Array.isArray(cur)&&cur.includes(o)?'selected':''}" data-val="${esc(o)}" onclick="toggleMbBtn('${q.id}',this)">${esc(o)}</div>`).join('')}</div><div style="font-size:11px;color:var(--muted);margin-top:10px;font-weight:500">Select all that apply</div>`;
}
function buildThreeOptions(q){
  const opts=(q.options||['A','B','C']).slice(0,3),icons=(q.icons||['','','']).slice(0,3),cur=S.answers[q.id];
  return `<div class="three-grid" id="a-${q.id}">${opts.map((o,i)=>`<div class="three-btn ${cur===o?'selected':''}" data-val="${esc(o)}" onclick="chooseThree('${q.id}',this)">${icons[i]?`<span class="t-ico">${esc(icons[i])}</span>`:''}<span>${esc(o)}</span></div>`).join('')}</div>`;
}
function buildPicButtons(q){
  const pics=q.pictures||[];
  if(!pics.length) return `<div style="color:var(--muted);font-size:13px;padding:16px 0;font-weight:500">No images added. Edit the question to upload images.</div>`;
  const cur=S.answers[q.id];
  return `<div class="pic-btns-grid" id="a-${q.id}">${pics.map(p=>`<div class="pic-btn-card ${cur===p.label?'selected':''}" data-val="${esc(p.label||'')}" onclick="choosePicBtn('${q.id}',this)"><div class="pic-btn-wrap"><img src="${p.url||''}" alt="${esc(p.label||'')}"><div class="pic-check">✓</div></div><div class="pic-btn-lbl">${esc(p.label||'')}</div></div>`).join('')}</div>`;
}
function buildDropdown(q){
  const opts=q.options||[],cur=S.answers[q.id];
  return `<div class="custom-drop-wrap"><div class="custom-drop-trigger ${cur?'has-val':''}" id="drop-trig-${q.id}" onclick="toggleDrop('${q.id}')"><span id="drop-label-${q.id}">${esc(cur)||'Choose an option…'}</span><span class="drop-arrow">▾</span></div><div class="custom-drop-menu" id="drop-menu-${q.id}">${opts.map(o=>`<div class="drop-opt ${cur===o?'sel':''}" data-val="${esc(o)}" onclick="chooseDrop('${q.id}',this)"><div class="drop-dot"></div>${esc(o)}</div>`).join('')}</div></div>`;
}
function buildRating(q){
  const max=q.ratingMax||10,cur=S.answers[q.id]||0;
  return `<div class="s-rating" id="a-${q.id}">${Array.from({length:max},(_,i)=>`<div class="rate-btn ${i<cur?'sel':''}" onclick="chooseRating('${q.id}',${i+1},this)">${i+1}</div>`).join('')}</div><div style="display:flex;justify-content:space-between;margin-top:7px"><span style="font-size:10px;color:var(--muted);font-weight:600">Not likely</span><span style="font-size:10px;color:var(--muted);font-weight:600">Very likely</span></div>`;
}
function buildScale(q){
  const mn=q.scaleMin??0,mx=q.scaleMax??10,cur=S.answers[q.id]??Math.floor((mn+mx)/2);
  const pct=Math.round(((cur-mn)/(mx-mn))*100);
  if(S.answers[q.id]==null) S.answers[q.id]=cur;
  return `<div><div class="scale-val-display" id="sv-${q.id}">${cur}</div><input type="range" class="custom-range" id="a-${q.id}" min="${mn}" max="${mx}" value="${cur}" style="--pct:${pct}" oninput="updateScale('${q.id}',this,${mn},${mx})"><div class="scale-labels"><span class="scale-lbl">${esc(q.scaleMinLabel||'Not at all')}</span><span class="scale-lbl">${esc(q.scaleMaxLabel||'Completely')}</span></div></div>`;
}
function buildDate(q){
  const saved=S.answers[q.id]||'';let dd='',mm='',yy='';
  if(saved){const months=['January','February','March','April','May','June','July','August','September','October','November','December'],parts=saved.split(' ');if(parts.length===3){dd=parts[0];mm=String(months.indexOf(parts[1])+1);yy=parts[2];}}
  const now=new Date();
  const days=Array.from({length:31},(_,i)=>`<option value="${i+1}" ${dd==i+1?'selected':''}>${i+1}</option>`).join('');
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'].map((m,i)=>`<option value="${i+1}" ${mm==i+1?'selected':''}>${m}</option>`).join('');
  const years=Array.from({length:80},(_,i)=>`<option value="${now.getFullYear()-i}" ${yy==now.getFullYear()-i?'selected':''}>${now.getFullYear()-i}</option>`).join('');
  return `<div class="date-grid" id="a-${q.id}"><div><div class="date-part-lbl">Day</div><select class="date-sel" id="dd-${q.id}" onchange="updateDate('${q.id}')">${days}</select></div><div><div class="date-part-lbl">Month</div><select class="date-sel" id="mm-${q.id}" onchange="updateDate('${q.id}')">${months}</select></div><div><div class="date-part-lbl">Year</div><select class="date-sel" id="yy-${q.id}" onchange="updateDate('${q.id}')">${years}</select></div></div><div class="date-display" id="date-disp-${q.id}">${esc(saved)}</div>`;
}

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
function goSlide(idx){
  slideMap.forEach((sm,i)=>{
    const el=document.getElementById(`sl-${sm.id}`);
    if(!el) return;
    el.classList.remove('active','slide-up','slide-down');
    if(i===idx){el.classList.add('slide-up');requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('active')));const inp=el.querySelector('input:not([type=range]):not([type=file]):not([type=checkbox]):not([type=radio]),textarea');if(inp)setTimeout(()=>inp.focus(),320);}
  });
  S.currentSlide=idx;
  const pct=idx===0?0:idx>=slideMap.length-1?100:Math.round(((idx-1)/(slideMap.length-2))*100);
  document.getElementById('progFill').style.width=pct+'%';
  if(idx>0&&idx<slideMap.length-1) autoSaveProgress();
}
function exitSlide(cb){const sm=slideMap[S.currentSlide],el=document.getElementById(`sl-${sm.id}`);if(el){el.classList.remove('slide-up');el.classList.add('slide-down');el.classList.remove('active');setTimeout(()=>{el.classList.remove('slide-down');cb();},80);}else cb();}

function nextSlide() {
  if (S.currentSlide >= slideMap.length - 1) return;
  const sm = slideMap[S.currentSlide];

  // ── VALIDATION: Standalone Questions ──
  if (sm.type === 'question') {
    const q = S.items.find(i => i.id === sm.id);
    if (q && q.required) {
      const ans = S.answers[q.id];
      if (ans == null || ans === '' || (Array.isArray(ans) && !ans.length)) {
        toast('⚠️ This question is required');
        return;
      }
    }
  } 
  // ── VALIDATION: Sections ──
  else if (sm.type === 'section') {
    const sec = S.items.find(i => i.id === sm.id);
    if (sec) {
      const children = S.items.filter(q => q.kind === 'question' && q.sectionId === sec.id);
      for (const cq of children) {
        if (cq.required) {
          const ans = S.answers[cq.id];
          if (ans == null || ans === '' || (Array.isArray(ans) && !ans.length)) {
            toast(`⚠️ "${(cq.question || 'A question').slice(0, 30)}..." is required`);
            return;
          }
        }
      }
    }
  }
  // ── VALIDATION: Matrix (Checks ALL rows/columns if the matrix is required) ──
  else if (sm.type === 'matrix') {
    const mat = S.items.find(i => i.id === sm.id);
    if (mat && mat.required) {
      let isMissingData = false;
      
      // Loop through every row and column to ensure it has an answer
      for (const r of mat.rows) {
        for (const c of mat.columns) {
          const key = r.id + '::' + c;
          if (!S.answers[mat.id] || S.answers[mat.id][key] == null || S.answers[mat.id][key] === '') {
            isMissingData = true;
            break; // Stop checking this row if something is missing
          }
        }
        if (isMissingData) break; // Stop checking altogether
      }

      if (isMissingData) {
        toast('⚠️ Please complete all rows in this matrix before continuing');
        return; // Block them from moving forward
      }
    }
  }

  // If all validations pass, proceed to the next slide
  exitSlide(() => goSlide(S.currentSlide + 1));
}
function getNextIdx(){
  const sm=slideMap[S.currentSlide];
  if(sm.type==='question'){const q=S.items.find(i=>i.id===sm.id);if(q&&q.logic&&q.logic.length){const ans=S.answers[q.id],ansStr=Array.isArray(ans)?ans.join(','):String(ans||'');for(const rule of q.logic){let match=rule.condition==='is'?(ansStr===rule.ifValue||(Array.isArray(ans)&&ans.includes(rule.ifValue))):ansStr.toLowerCase().includes(rule.ifValue.toLowerCase());if(match){if(rule.goto==='__end__') return slideMap.length-1;const ti=slideMap.findIndex(s=>s.id===rule.goto);if(ti>-1) return ti;}}}}
  if(sm.type==='section'){const sec=S.items.find(i=>i.id===sm.id);if(sec&&sec.logic&&sec.logic.length){for(const rule of sec.logic){const ans=S.answers[rule.ifQid];if(ans==null) continue;const ansStr=Array.isArray(ans)?ans.join(','):String(ans||'');if(ansStr===rule.ifValue||(Array.isArray(ans)&&ans.includes(rule.ifValue))){if(rule.goto==='__end__') return slideMap.length-1;const ti=slideMap.findIndex(s=>s.id===rule.goto);if(ti>-1) return ti;}}}}
  return Math.min(S.currentSlide+1,slideMap.length-1);
}
function prevSlide(){if(S.currentSlide<=0)return;exitSlide(()=>goSlide(S.currentSlide-1));}
function skipSlide(){exitSlide(()=>goSlide(Math.min(S.currentSlide+1,slideMap.length-1)));}
function resumeProgress(){const p=loadRespondentProgress();if(!p)return;S.answers=p.answers||{};buildPreviewDOM();goSlide(Math.min(p.currentSlide||1,slideMap.length-2));toast('Progress restored ✓');}
function discardProgress(){clearRespondentProgress();S.answers={};buildPreviewDOM();goSlide(0);toast('Starting fresh');}
function startOver(){clearRespondentProgress();S.answers={};S.currentSlide=0;buildPreviewDOM();goSlide(0);}

/* ════════════════════════════════════════════
   SUBMIT
════════════════════════════════════════════ */
function submitForm(){
  if(S.submitted) return;
  const sm=slideMap[S.currentSlide];
  // Validate last slide
  if(sm.type==='question'){const q=S.items.find(i=>i.id===sm.id);if(q&&q.required){const ans=S.answers[q.id];if(ans==null||ans===''||(Array.isArray(ans)&&!ans.length)){toast('⚠️ This question is required');return;}}}
  if(sm.type==='section'){const sec=S.items.find(i=>i.id===sm.id);if(sec){for(const cq of S.items.filter(q=>q.kind==='question'&&q.sectionId===sec.id)){if(cq.required&&(S.answers[cq.id]==null||S.answers[cq.id]==='')) {toast(`⚠️ "${(cq.question||'Q').slice(0,25)}" is required`);return;}}}}
  S.submitted=true;
  const allQs=S.items.filter(i=>i.kind==='question');
  const allMats=S.items.filter(i=>i.kind==='matrix');
  const resp={id:uid(),timestamp:new Date().toISOString(),timestampReadable:new Date().toLocaleString(),formTitle:S.settings.title,answers:{},matrixAnswers:{}};
  allQs.forEach(q=>{resp.answers[q.id]={question:q.question,type:q.type,value:S.answers[q.id]??null};});
  allMats.forEach(m=>{resp.matrixAnswers[m.id]={title:m.title,columns:m.columns,rows:m.rows.map(r=>({label:r.label,type:r.type,values:m.columns.reduce((acc,col)=>{const key=`${r.id}::${col}`;acc[col]=S.answers[m.id]?.[key]??null;return acc;},{})}))};});
  S.responses.push(resp); clearRespondentProgress();
  document.getElementById('progFill').style.width='100%';
  exitSlide(()=>goSlide(slideMap.length-1));
  toast('🎉 Submitted!');

  // ── Save to Firestore via Cloud Function ──────────────────────────────────
  // DEPLOY_API_URL is replaced automatically during build (see DEPLOYMENT.md).
  // In development (file:// or localhost) the fetch is simply skipped.
  const apiUrl = window.__FF_API_URL__;   // injected by build script
  if (apiUrl) {
    fetch(apiUrl + '/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(resp)
    })
    .then(r => r.json())
    .then(d => { if (!d.success) console.warn('Submit warning:', d); })
    .catch(e => console.warn('Offline — response saved locally only:', e));
  }
}

function renderResults(){
  document.getElementById('rTitle').textContent=S.settings.title+' — Results';
  const n=S.responses.length;
  document.getElementById('rSub').textContent=`${n} response${n!==1?'s':''}`;
  document.getElementById('sViews').textContent=S.views;
  document.getElementById('sResp').textContent=n;
  document.getElementById('sRate').textContent=S.views>0?Math.round((n/S.views)*100)+'%':'—';
  const t=document.getElementById('respTable');
  if(!n){t.innerHTML=`<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-ttl">No responses yet</div><div class="empty-sub">Preview the form and submit to see results</div></div>`;return;}
  const allQs=S.items.filter(i=>i.kind==='question');
  const allMats=S.items.filter(i=>i.kind==='matrix');
  t.innerHTML=S.responses.map((r,i)=>{
    const qRows=allQs.map(q=>{const a=r.answers[q.id];if(!a||a.value==null)return '';const v=Array.isArray(a.value)?a.value.join(', '):String(a.value);return `<div class="resp-row"><span class="resp-q">${esc((a.question||'').slice(0,40))}</span><span class="resp-a">${esc(v)}</span></div>`;}).filter(Boolean).join('');
    const matRows=allMats.map(m=>{const ma=r.matrixAnswers?.[m.id];if(!ma)return '';return `<div class="resp-row" style="display:block"><span class="resp-q" style="display:block;margin-bottom:4px">⊞ ${esc(ma.title)}</span><div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;width:100%"><tr><th style="padding:3px 8px;background:var(--surface2);border:1px solid var(--border);text-align:left">Row</th>${(ma.columns||[]).map(c=>`<th style="padding:3px 8px;background:var(--surface2);border:1px solid var(--border)">${esc(c)}</th>`).join('')}</tr>${(ma.rows||[]).map(row=>`<tr><td style="padding:3px 8px;border:1px solid var(--border);font-weight:600">${esc(row.label)}</td>${(ma.columns||[]).map(col=>`<td style="padding:3px 8px;border:1px solid var(--border);text-align:center">${esc(String(row.values?.[col]??'—'))}</td>`).join('')}</tr>`).join('')}</table></div></div>`;}).filter(Boolean).join('');
    return `<div class="resp-entry"><div class="resp-meta">Response #${i+1} · ${r.timestampReadable}</div>${qRows}${matRows||(!qRows?'<span style="color:var(--muted);font-size:11px">No answers recorded</span>':'')}</div>`;
  }).join('');
}
function clearAll(){if(!confirm('Delete all responses?'))return;S.responses=[];S.views=0;renderResults();toast('Cleared');}
function exportCSV(){

  dl([hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv',S.settings.title+'-responses.csv');toast('CSV exported ↓');
}

/* ════════════════════════════════════════════
   HTML STANDALONE EXPORT
════════════════════════════════════════════ */
function exportHTML() {
  // 1. Clone the entire document structure
  const rootClone = document.documentElement.cloneNode(true);

  // 2. Remove Builder-specific UI panels from the clone
  const builderUI = rootClone.querySelector('#builder');
  if (builderUI) builderUI.remove();

  const shareModal = rootClone.querySelector('#shareModal');
  if (shareModal) shareModal.remove();

  // 3. Make the Preview view visible by default
  const previewUI = rootClone.querySelector('#preview');
  if (previewUI) {
    previewUI.style.display = 'flex';
    previewUI.classList.remove('hidden');
  }

  // Hide the "Back to Edit" button and "Preview" pill for the end-user
  const backBtn = rootClone.querySelector('.prev-nav .btn-ghost');
  if (backBtn) backBtn.remove();
  const previewPill = rootClone.querySelector('.prev-nav .pill-purple');
  if (previewPill) previewPill.remove();

  // 4. Inject the runtime configuration and getpantry override
  const injectedScript = document.createElement('script');
  injectedScript.textContent = `
    // --- STANDALONE FORM CONFIGURATION ---
    const PANTRY_URL = "https://getpantry.cloud/apiv1/pantry/5cb11065-c901-4c2d-a999-b170c23c7e33/basket/QuantifAI";

    // Inject the current form state
    S.items = ${JSON.stringify(S.items)};
    S.settings = ${JSON.stringify(S.settings)};

    // Force preview mode on page load
    window.onload = () => {
      applyStyleSettings();
      document.getElementById('preview').style.display = 'flex';
      document.getElementById('preview').classList.remove('hidden');
      launchPreview();
    };

    // ── UPDATED submitForm: APPEND instead of REPLACE ─────────────────────
    submitForm = async function() {
      if (S.submitted) return;
      const sm = slideMap[S.currentSlide];

      // Validation (unchanged)
      if (sm.type === 'question') {
        const q = S.items.find(i => i.id === sm.id);
        if (q && q.required) {
          const ans = S.answers[q.id];
          if (ans == null || ans === '' || (Array.isArray(ans) && !ans.length)) {
            toast('⚠️ This question is required');
            return;
          }
        }
      }
      if (sm.type === 'section') {
        const sec = S.items.find(i => i.id === sm.id);
        if (sec) {
          for (const cq of S.items.filter(q => q.kind === 'question' && q.sectionId === sec.id)) {
            if (cq.required && (S.answers[cq.id] == null || S.answers[cq.id] === '')) {
              toast('⚠️ "' + (cq.question || 'Q').slice(0,25) + '" is required');
              return;
            }
          }
        }
      }

      S.submitted = true;

      const allQs = S.items.filter(i => i.kind === 'question');
      const allMats = S.items.filter(i => i.kind === 'matrix');

      const resp = {
        id: uid(),
        timestamp: new Date().toISOString(),
        formTitle: S.settings.title,
        answers: {},
        matrixAnswers: {}
      };

      allQs.forEach(q => { resp.answers[q.id] = { question: q.question, type: q.type, value: S.answers[q.id] ?? null }; });
      allMats.forEach(m => {
        resp.matrixAnswers[m.id] = {
          title: m.title,
          columns: m.columns,
          rows: m.rows.map(r => ({
            label: r.label,
            type: r.type,
            values: m.columns.reduce((acc, col) => {
              const key = r.id + '::' + col;
              acc[col] = S.answers[m.id]?.[key] ?? null;
              return acc;
            }, {})
          }))
        };
      });

      // Show success UI
      clearRespondentProgress();
      document.getElementById('progFill').style.width = '100%';
      exitSlide(() => goSlide(slideMap.length - 1));
      toast('🎉 Submitted!');

      // ── APPEND to GetPantry (the fix) ─────────────────────────────
      if (PANTRY_URL) {
        try {
          // 1. Get current data
          const getRes = await fetch(PANTRY_URL, { method: 'GET' });
          let current = [];
          if (getRes.ok) {
            const data = await getRes.json();
            if (Array.isArray(data)) current = data;
            else if (data) current = [data];           // first submission
          }

          // 2. Append new response
          current.push(resp);

          // 3. Write full array back
          await fetch(PANTRY_URL, {
            method: 'PUT',                              // ← important
            headers: { 'Content-Type': 'application/json' },
